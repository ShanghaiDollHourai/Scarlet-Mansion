<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Touhou -- Scarlet Mansion v6</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Cinzel:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Cinzel',serif;}
#wrap{position:relative;width:480px;height:640px;}
canvas{display:block;}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000000ee;z-index:30;gap:10px;}
#overlay h1{font-size:36px;letter-spacing:4px;text-align:center;line-height:1.3;}
.sub{color:#aaa;font-size:11px;letter-spacing:3px;text-align:center;}
.score-disp{color:#ffd700;font-size:18px;text-shadow:0 0 10px #ffd700;}
.boss-select{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;justify-content:center;}
.boss-btn{background:none;border:2px solid #555;color:#888;font-family:'Cinzel',serif;font-size:11px;padding:8px 12px;cursor:pointer;letter-spacing:2px;transition:all .2s;text-align:center;line-height:1.4;}
.boss-btn:hover{border-color:#fff;color:#fff;}
.boss-btn.active.remilia{border-color:#cc0033;color:#cc0033;box-shadow:0 0 12px #cc003366;}
.boss-btn.active.sakuya{border-color:#aaccff;color:#aaccff;box-shadow:0 0 12px #aaccff66;}
.boss-btn.active.patchouli{border-color:#9966cc;color:#cc99ff;box-shadow:0 0 12px #9966cc66;}
.boss-btn.active.meiling{border-color:#44cc66;color:#44cc66;box-shadow:0 0 12px #44cc6666;}
#diffSelect{display:flex;gap:8px;margin-top:2px;}
.diff-btn{background:none;border:1px solid #444;color:#666;font-family:'Cinzel',serif;font-size:11px;padding:5px 12px;cursor:pointer;letter-spacing:2px;transition:all .2s;}
.diff-btn:hover,.diff-btn.active{border-color:#cc0033;color:#cc0033;}
.diff-btn.active[data-d="4"]{border-color:#00ffaa;color:#00ffaa;}
#startBtn{margin-top:6px;background:none;border:2px solid #cc0033;color:#cc0033;font-family:'Cinzel',serif;font-size:16px;padding:10px 32px;cursor:pointer;letter-spacing:3px;transition:all .2s;}
#startBtn:hover{background:#cc0033;color:#000;box-shadow:0 0 20px #cc0033;}
#spellFlash{position:absolute;inset:0;pointer-events:none;z-index:25;opacity:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
#spellFlash .spell-en{font-size:20px;color:#fff;letter-spacing:4px;text-shadow:0 0 20px #cc0033;}
#spellFlash .spell-jp{font-family:'Noto Serif JP',serif;font-size:13px;color:#ffaaaa;letter-spacing:6px;}
#timestopOverlay{position:absolute;inset:0;pointer-events:none;z-index:20;opacity:0;background:linear-gradient(135deg,#001133cc,#002244cc);border:2px solid #aaccff44;}
#cirnoBtn{margin-top:4px;background:none;border:2px solid #44ccff;color:#44ccff;font-family:'Cinzel',serif;font-size:13px;padding:7px 22px;cursor:pointer;letter-spacing:3px;transition:all .2s;}
#cirnoBtn:hover{background:#44ccff22;box-shadow:0 0 16px #44ccff88;}
#cirnoDiffScreen{display:none;flex-direction:column;align-items:center;gap:10px;}
#cirnoDiffScreen h2{color:#44ccff;font-size:22px;letter-spacing:4px;text-shadow:0 0 16px #44ccff88;}
#cirnoDiffScreen .sub{color:#88ccee;font-size:10px;letter-spacing:2px;text-align:center;}
.cirno-diff-btn{background:none;border:2px solid #1a4455;color:#558899;font-family:'Cinzel',serif;font-size:12px;padding:9px 16px;cursor:pointer;letter-spacing:2px;transition:all .2s;width:320px;text-align:left;line-height:1.5;}
.cirno-diff-btn:hover,.cirno-diff-btn.active{border-color:#44ccff;color:#44ccff;box-shadow:0 0 12px #44ccff44;}
.cirno-diff-btn .cdname{font-size:13px;font-weight:bold;display:block;}
.cirno-diff-btn .cddesc{font-size:9px;opacity:.65;letter-spacing:1px;display:block;margin-top:2px;}
#cirnoStartBtn{background:none;border:2px solid #44ccff;color:#44ccff;font-family:'Cinzel',serif;font-size:14px;padding:8px 28px;cursor:pointer;letter-spacing:3px;margin-top:4px;transition:all .2s;}
#cirnoStartBtn:hover{background:#44ccff;color:#000;box-shadow:0 0 20px #44ccff;}
#cirnoBackBtn{background:none;border:1px solid #334;color:#446;font-family:'Cinzel',serif;font-size:10px;padding:4px 14px;cursor:pointer;letter-spacing:2px;transition:all .2s;}
#cirnoBackBtn:hover{border-color:#88aacc;color:#88aacc;}
#freezeOverlay{position:absolute;inset:0;pointer-events:none;z-index:19;opacity:0;background:linear-gradient(135deg,#aaeeff44,#00ccff22);border:2px solid #88eeff66;}
#pauseOverlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:#000000dd;z-index:40;gap:14px;}
#pauseOverlay h2{font-size:32px;letter-spacing:6px;color:#fff;text-shadow:0 0 20px #ffffff44;}
#pauseOverlay .pause-sub{color:#555;font-size:10px;letter-spacing:3px;text-align:center;margin-bottom:4px;}
.pause-btn{background:none;border:2px solid #555;color:#888;font-family:'Cinzel',serif;font-size:14px;padding:10px 32px;cursor:pointer;letter-spacing:3px;transition:all .2s;width:220px;text-align:center;}
.pause-btn:hover{border-color:#fff;color:#fff;box-shadow:0 0 12px #ffffff44;}
.pause-btn.resume{border-color:#cc0033;color:#cc0033;}
.pause-btn.resume:hover{background:#cc0033;color:#000;box-shadow:0 0 20px #cc0033;}
#pauseBtn{position:absolute;top:8px;right:8px;background:none;border:1px solid #333;color:#444;font-family:'Cinzel',serif;font-size:9px;padding:3px 7px;cursor:pointer;letter-spacing:2px;z-index:35;transition:all .2s;display:none;}
#pauseBtn:hover{border-color:#888;color:#888;}
#sakuyaBtn{margin-top:4px;background:none;border:2px solid #aaccff;color:#aaccff;font-family:'Cinzel',serif;font-size:13px;padding:7px 22px;cursor:pointer;letter-spacing:3px;transition:all .2s;}
#sakuyaBtn:hover{background:#aaccff22;box-shadow:0 0 16px #aaccff88;}
#tsOverlay{position:absolute;inset:0;pointer-events:none;z-index:21;opacity:0;background:linear-gradient(135deg,#001133bb,#002255aa);border:2px solid #aaccff33;transition:opacity .12s;}
.sakuya-diff-btn{background:none;border:2px solid #1a3355;color:#446688;font-family:'Cinzel',serif;font-size:12px;padding:9px 16px;cursor:pointer;letter-spacing:2px;transition:all .2s;width:320px;text-align:left;line-height:1.5;}
.sakuya-diff-btn:hover,.sakuya-diff-btn.active{border-color:#aaccff;color:#aaccff;box-shadow:0 0 12px #aaccff44;}
.sakuya-diff-btn .sdname{font-size:13px;font-weight:bold;display:block;}
.sakuya-diff-btn .sddesc{font-size:9px;opacity:.65;letter-spacing:1px;display:block;margin-top:2px;}
#sakuyaStartBtn{background:none;border:2px solid #aaccff;color:#aaccff;font-family:'Cinzel',serif;font-size:14px;padding:8px 28px;cursor:pointer;letter-spacing:3px;margin-top:4px;transition:all .2s;}
#sakuyaStartBtn:hover{background:#aaccff;color:#000;box-shadow:0 0 20px #aaccff;}
#sakuyaBackBtn{background:none;border:1px solid #334;color:#446;font-family:'Cinzel',serif;font-size:10px;padding:4px 14px;cursor:pointer;letter-spacing:2px;transition:all .2s;}
#sakuyaBackBtn:hover{border-color:#aaccff88;color:#aaccff88;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="480" height="640"></canvas>
  <div id="timestopOverlay"></div>
  <div id="freezeOverlay"></div>
  <div id="tsOverlay"></div>
  <div id="spellFlash">
    <div class="spell-en" id="spellEn"></div>
    <div class="spell-jp" id="spellJp"></div>
  </div>
  <div id="pauseOverlay">
    <h2>PAUSED</h2>
    <div class="pause-sub" id="pauseSub">SCORE: 00000000</div>
    <button class="pause-btn resume" id="resumeBtn">▶ RESUME</button>
    <button class="pause-btn" id="mainMenuBtn">⌂ MAIN MENU</button>
  </div>
  <button id="pauseBtn">II PAUSE</button>
  <div id="overlay">
    <h1 id="titleH1" style="color:#cc0033;text-shadow:0 0 20px #cc003388;">SCARLET<br>MANSION</h1>
    <div class="sub">SELECT YOUR OPPONENT</div>
    <div class="boss-select">
      <button class="boss-btn remilia active" data-boss="remilia">REMILIA<br><span style="font-size:10px;opacity:.6">SCARLET DEVIL</span></button>
      <button class="boss-btn sakuya" data-boss="sakuya">SAKUYA<br><span style="font-size:10px;opacity:.6">PERFECT MAID</span></button>
      <button class="boss-btn patchouli" data-boss="patchouli">PATCHOULI<br><span style="font-size:10px;opacity:.6">GREAT LIBRARY</span></button>
      <button class="boss-btn meiling" data-boss="meiling">MEILING<br><span style="font-size:10px;opacity:.6">GATE GUARD</span></button>
    </div>
    <div class="sub" style="color:#555;font-size:10px;margin-top:2px">SHIFT=MARISA &bull; DEFEAT ANY BOSS TO UNLOCK ★</div>
    <div id="diffSelect">
      <button class="diff-btn active" data-d="0">EASY</button>
      <button class="diff-btn" data-d="1">NORMAL</button>
      <button class="diff-btn" data-d="2">HARD</button>
      <button class="diff-btn" data-d="3">LUNATIC</button>
      <button class="diff-btn" data-d="4" style="border-color:#00ffaa44;color:#00ffaa66">IMMORTAL</button>
    </div>
    <div class="sub" style="color:#444;margin-top:2px">WASD MOVE &nbsp;G SHOOT &nbsp;F FREEZE/BOMB &nbsp;SHIFT=SHIELD(CIRNO)/MARISA</div>
    <div class="score-disp" id="hiScoreDisp">HI: 0</div>
    <button id="startBtn">BEGIN</button>
    <button id="cirnoBtn">⑨ CIRNO MODE</button>
    <button id="sakuyaBtn">✦ A MAID'S ERRAND</button>
  </div>
  <div id="overlay3" style="position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:#000000ee;z-index:32;gap:10px;">
    <h1 style="color:#aaccff;font-size:26px;letter-spacing:4px;text-shadow:0 0 20px #aaccff88;">✦ A MAID'S<br>ERRAND</h1>
    <div class="sub" style="color:#88aacc;">SAKUYA IZAYOI — SELECT DIFFICULTY</div>
    <div class="sub" style="color:#334455;font-size:9px;">TEA TIME APPROACHES. DO NOT BE LATE.</div>
    <div id="sakuyaDiffList" style="display:flex;flex-direction:column;gap:6px;margin-top:4px;">
      <button class="sakuya-diff-btn active" data-sd="0"><span class="sdname">☕ LEISURELY PACE</span><span class="sddesc">Lady Remilia is in good spirits. Plenty of time.</span></button>
      <button class="sakuya-diff-btn" data-sd="1"><span class="sdname">☕ PUNCTUAL</span><span class="sddesc">Normal pace. Should be manageable.</span></button>
      <button class="sakuya-diff-btn" data-sd="2"><span class="sdname">☕ RUNNING LATE</span><span class="sddesc">Complications mounting. Stay sharp.</span></button>
      <button class="sakuya-diff-btn" data-sd="3"><span class="sdname">☕ THE TEA IS COLD</span><span class="sddesc">It's already too late. Or is it?</span></button>
    </div>
    <button id="sakuyaStartBtn">✦ BEGIN ERRAND</button>
    <button id="sakuyaBackBtn">← BACK</button>
  </div>
  <!-- Cirno difficulty selection screen (nested) -->
  <div id="overlay2" style="position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:#000000ee;z-index:31;gap:10px;">
    <h1 style="color:#44ccff;font-size:28px;letter-spacing:4px;text-shadow:0 0 20px #44ccff88;">⑨ CIRNO<br>MODE</h1>
    <div class="sub" style="color:#88ccee">SELECT DIFFICULTY</div>
    <div id="cirnoDiffList" style="display:flex;flex-direction:column;gap:6px;margin-top:4px;">
      <button class="cirno-diff-btn active" data-cd="0">
        <span class="cdname">⑨ EASY AS ICE</span>
        <span class="cddesc">Even Cirno can do this. Probably. Bosses barely try.</span>
      </button>
      <button class="cirno-diff-btn" data-cd="1">
        <span class="cdname">⑨ THE STRONGEST</span>
        <span class="cddesc">Cirno's preferred difficulty. A real fight, she insists.</span>
      </button>
      <button class="cirno-diff-btn" data-cd="2">
        <span class="cdname">⑨ ACTUALLY HARD</span>
        <span class="cddesc">Even Dai is worried. Bullets everywhere. Good luck.</span>
      </button>
      <button class="cirno-diff-btn" data-cd="3">
        <span class="cdname">⑨ LUNATIC FAIRY</span>
        <span class="cddesc">Only the strongest could finish this. (She means herself.)</span>
      </button>
    </div>
    <button id="cirnoStartBtn">⑨ FREEZE THEM ALL</button>
    <button id="cirnoBackBtn">← BACK</button>
  </div>
</div>
<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const W=480,H=640,PI2=Math.PI*2,BOSS_HIT_R2=400;
const DIFF=[
  {name:'EASY',    spd:1.8,bspd:2.2,density:.5},
  {name:'NORMAL',  spd:2.5,bspd:3.2,density:.75},
  {name:'HARD',    spd:3.5,bspd:4.5,density:1},
  {name:'LUNATIC', spd:5,  bspd:6.5,density:1.4},
  {name:'IMMORTAL',spd:2.5,bspd:3.2,density:.75},
];

// ── STATIC DATA ────────────────────────────────────────────────────────────
const SPELLS={
  remilia:[
    {en:'Scarlet Sign',   jp:'紅符「スカーレットメイスター」',col:'#cc0033',pat:'ring'},
    {en:'Bloody Waltz',   jp:'血符「ブラッディワルツ」',     col:'#ff6600',pat:'spiral'},
    {en:"Vampire's Kiss", jp:'吸符「ヴァンパイアキス」',     col:'#aa00ff',pat:'cross'},
  ],
  sakuya:[
    {en:'Silver Sign "Killing Doll"',      jp:'銀符「キリングドール」', col:'#88bbff',pat:'knifefan', ts:true},
    {en:'Illusion Sign "Killing Doll EX"', jp:'幻符「キリングドールEX」',col:'#44ffcc',pat:'knifewall',ts:true},
    {en:'Perfect Maid "The World"',        jp:'咲夜「ザ・ワールド」',  col:'#ffffff',pat:'theworld', ts:true},
  ],
  patchouli:[
    {en:'Fire & Water Sign "Agni Shine"',    jp:'火水符「アグニシャイン」',    col:'#ff6633',pat:'firebook'},
    {en:'Wood & Metal Sign "Metal Fatigue"', jp:'木金符「メタルファティーグ」',col:'#88cc44',pat:'woodbook'},
    {en:"Philosopher's Stone",               jp:'賢者の石',                    col:'#cc88ff',pat:'philstone'},
  ],
  meiling:[
    {en:'Rainbow Fist Sign "Colorful Rain"', jp:'虹符「カラフルレイン」',  col:'#ff8844',pat:'meilingring', kicks:1},
    {en:'Colorful Sign "Colorful Storm"',    jp:'彩符「カラフルストーム」',col:'#44ff88',pat:'meilingstorm',kicks:2},
    {en:'Supreme Fist "Roc Fist"',           jp:'極拳「鵬拳」',            col:'#ffdd44',pat:'meilingroc',  kicks:3},
  ],
  flandre:[
    {en:'Taboo "Kagome Kagome"',       jp:'禁忌「かごめかごめ」',              col:'#ff44ff',pat:'flan1'},
    {en:'Taboo "Four of a Kind"',      jp:'禁忌「フォーオブアカインド」',      col:'#ff8800',pat:'flan2'},
    {en:'Taboo "Three of a Kind"',     jp:'禁忌「スリーオブアカインド」',      col:'#ff2244',pat:'flan3_split'},
    {en:'Taboo "Laevatein"',           jp:'禁忌「レーヴァテイン」',            col:'#ffffff',pat:'flan4_laser'},
  ],
};

// ── CAMPAIGN DIALOGUE (Reimu/Marisa only — never shown in Cirno mode) ──────
const DLG={
  remilia:{
    spell:[
      {s:'remilia',t:"So you've come to my mansion uninvited. How delightfully reckless."},
      {s:'marisa', t:"Ze, we prefer 'freelance investigators'."},
      {s:'reimu',  t:"Ignore her. Remilia — what's causing the incidents?"},
      {s:'remilia',t:"Incidents are such a pedestrian concern. I simply wanted a scarlet sky."},
      {s:'marisa', t:"You nearly blotted out the sun for aesthetics?"},
      {s:'remilia',t:"I'm a vampire, dear. Aesthetics ARE necessity."},
    ],
    spell1:[
      {s:'remilia',t:"Hm. More resilient than I expected."},
      {s:'remilia',t:"Very well. Let me show you what a true vampire commands."},
      {s:'marisa', t:"...She just pulled out a spear from nowhere."},
      {s:'reimu',  t:"Focus."},
    ],
    defeat:[
      {s:'remilia',t:"...Competent, both of you. Annoying."},
      {s:'reimu',  t:"The disturbances. They're not just yours, are they."},
      {s:'remilia',t:"...The basement has been noisier than usual."},
      {s:'marisa', t:"Noisier how?"},
      {s:'remilia',t:"Singing. She only sings when she wants something."},
      {s:'reimu',  t:"We're going down there."},
      {s:'remilia',t:"I can't stop you. But don't say I didn't warn you."},
    ]
  },
  sakuya:{
    spell:[
      {s:'sakuya', t:"I'll have you both removed from the premises. Efficiently."},
      {s:'marisa', t:"She stopped time already didn't she. I felt it."},
      {s:'reimu',  t:"Sakuya. We're not here for a fight."},
      {s:'sakuya', t:"And yet here we are."},
      {s:'marisa', t:"Ze, fair point."},
    ],
    spell1:[
      {s:'sakuya', t:"...You stopped my knives. Interesting."},
      {s:'sakuya', t:"Then I'll need to be considerably more creative with my time."},
      {s:'reimu',  t:"Here it comes—"},
      {s:'marisa', t:"ALREADY?!"},
    ],
    defeat:[
      {s:'sakuya', t:"...You work well together. Surprisingly."},
      {s:'reimu',  t:"The basement. What's down there right now?"},
      {s:'sakuya', t:"Lady Flandre has been unstable. More than usual."},
      {s:'marisa', t:"How unstable are we talking?"},
      {s:'sakuya', t:"Last Tuesday she destroyed an entire wing. I repaired it."},
      {s:'sakuya', t:"...Three times."},
      {s:'reimu',  t:"We're going in."},
      {s:'sakuya', t:"Then please. Don't agitate her."},
    ]
  },
  patchouli:{
    spell:[
      {s:'patchouli',t:"You're disrupting seventeen ongoing experiments by standing there."},
      {s:'marisa',   t:"Seventeen? Which ones? Can I have the notes—"},
      {s:'reimu',    t:"Marisa. Focus."},
      {s:'patchouli',t:"The magical resonance in this mansion has been catastrophically unstable."},
      {s:'reimu',    t:"Since when?"},
      {s:'patchouli',t:"Since she started singing again."},
    ],
    spell1:[

      {s:'reimu',    t:"...Move. Now."},

    defeat:[

      {s:'marisa',   t:"Flandre?"},
      {s:'patchouli',t:"The energy signature matches. Amplified. Considerably."},
      {s:'reimu',    t:"Has anyone checked on her?"},

      {s:'marisa',   t:"That's not ominous at all, ze."},
      {s:'patchouli',t:"Kagome, kagome. She keeps singing it. Be careful."},

  meiling:{
    spell:[

      {s:'reimu',  t:"Meiling, you're shaking."},

      {s:'reimu',  t:"Step aside, Meiling."},
      {s:'meiling',t:"...I can't. I'm sorry."},
    ],
    spell1:[
      {s:'meiling',t:"You're good. Better than I hoped, honestly."},
      {s:'meiling',t:"But I haven't shown you what I learned from Master."},
      {s:'reimu',  t:"You have a master?"},
      {s:'meiling',t:"Everyone who guards something precious does."},
      {s:'marisa', t:"...That was actually kind of cool, ze."},
    ],
    defeat:[
      {s:'meiling',t:"I couldn't stop you. I couldn't stop her either."},
      {s:'marisa', t:"Hey. You did your job. You held the door."},
      {s:'meiling',t:"She's been asking for someone to play with. For weeks."},

      {s:'meiling',t:"She's not evil. She just... doesn't understand."},
      {s:'marisa', t:"Yeah. We know."},
      {s:'meiling',t:"Come back okay? Both of you."},

  },
  flandre:{
    spell:[
      {s:'flandre',t:"Onee-sama said I could play today♪"},
      {s:'marisa', t:"...Ze. She's been waiting."},
      {s:'reimu',  t:"Flandre. We're not here to fight."},

      {s:'marisa', t:"Reimu."},
      {s:'reimu',  t:"I know."},
    ],
    spell1:[
      {s:'flandre',t:"Ohhh~ You didn't break right away! That's new♪"},
      {s:'flandre',t:"Usually people run by now. Or cry. Crying is boring."},
      {s:'reimu',  t:"We're not running."},
      {s:'flandre',t:"I knoooow! That's why this is fun! Can you do THIS one too~?"},

    prefinal:[

      {s:'flandre',t:"You're still here. You're STILL HERE!"},
      {s:'reimu',  t:"Flandre. It's okay. We're not going to hurt you."},

let AC,musicPlaying=false;
let musicGain=null;
function initAudio(){
  AC=new(window.AudioContext||window.webkitAudioContext)();
  musicGain=AC.createGain();musicGain.gain.value=1;musicGain.connect(AC.destination);
}
function tone(freq,dur,vol=.12,type='square',delay=0,musicBus=false){
  if(!AC)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(musicBus&&musicGain?musicGain:AC.destination);
  o.type=type;o.frequency.value=freq;
  const t=AC.currentTime+delay;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.01);
  g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.start(t);o.stop(t+dur+.05);
}
function duckMusic(v,ramp=.08){if(!musicGain||!AC)return;musicGain.gain.cancelScheduledValues(AC.currentTime);musicGain.gain.setValueAtTime(musicGain.gain.value,AC.currentTime);musicGain.gain.linearRampToValueAtTime(v,AC.currentTime+ramp);}

  if(!AC||musicPlaying)return;
  musicPlaying=true;
  const m=(boss==='cirno'?MUSIC_CIRNO:MUSIC[boss])||MUSIC.remilia,B=60/m.bpm;
  function loop(notes,vol,type){

      if(!musicPlaying)return;
      while(t<AC.currentTime+1.5){const[f,b]=notes[idx++%notes.length];tone(f,b*B*.85,vol,type,Math.max(0,t-AC.currentTime),true);t+=b*B;}

// ── OBJECT POOL ────────────────────────────────────────────────────────────
const POOL_SIZE=1200;
const bulletPool=Array.from({length:POOL_SIZE},()=>({x:0,y:0,vx:0,vy:0,r:4,col:'#ff4466',shape:'circle',grazed:false,frozen:false,active:false,_vx:0,_vy:0,ang:0,unblockable:false,homingFrames:0,willSplit:false,homingStrength:0}));
let poolHead=0;

function getBullet(){
  for(let i=0;i<POOL_SIZE;i++){
    const b=bulletPool[(poolHead+i)%POOL_SIZE];
    if(!b.active){poolHead=(poolHead+i+1)%POOL_SIZE;b.active=true;b.grazed=false;b.frozen=false;b.unblockable=false;b.homingFrames=0;b.willSplit=false;b.homingStrength=0;return b;}
  }
  return {x:0,y:0,vx:0,vy:0,r:4,col:'#ff4466',shape:'circle',grazed:false,frozen:false,active:true,_vx:0,_vy:0,ang:0,unblockable:false};
}

function mkBullet(x,y,vx,vy,r,col,shape){
  const b=getBullet();
  b.x=x;b.y=y;b.vx=vx;b.vy=vy;b.r=r||4;b.col=col||'#ff4466';b.shape=shape||'circle';
  b.ang=shape==='knife'?Math.atan2(vy,vx):0;
  bullets.push(b);
}

// ── BULLET HELPERS ─────────────────────────────────────────────────────────
function ring(x,y,n,spd,r,col,off=0){
  for(let i=0;i<n;i++){const a=i/n*PI2+off;mkBullet(x,y,Math.cos(a)*spd,Math.sin(a)*spd,r,col);}
}
function aimed(x,y,spd,r,col,spread=0){
  const dx=P.x-x,dy=P.y-y,d=Math.sqrt(dx*dx+dy*dy)||1,base=Math.atan2(dy,dx);
  if(!spread){mkBullet(x,y,dx/d*spd,dy/d*spd,r,col);}
  else for(let s=-1;s<=1;s++){const a=base+s*spread;mkBullet(x,y,Math.cos(a)*spd,Math.sin(a)*spd,r,col);}
}
function spiral(x,y,arms,spd,r,col,off){
  for(let i=0;i<arms;i++){const a=off+i/arms*PI2;mkBullet(x,y,Math.cos(a)*spd,Math.sin(a)*spd,r,col);}
}
function knife(x,y,vx,vy){mkBullet(x,y,vx,vy,5,'#ddeeff','knife');}
function knifeAimed(x,y,spd,spread=0){
  const dx=P.x-x,dy=P.y-y,d=Math.sqrt(dx*dx+dy*dy)||1,base=Math.atan2(dy,dx);
  if(!spread)knife(x,y,dx/d*spd,dy/d*spd);
  else for(let s=-1;s<=1;s++){const a=base+s*spread;knife(x,y,Math.cos(a)*spd,Math.sin(a)*s*spd);}
}
function placeKnifeFreeze(x,y,vx,vy){
  const b=getBullet();
  b.x=x;b.y=y;b.vx=vx;b.vy=vy;b.r=5;b.col='#ddeeff';b.shape='knife';b.ang=Math.atan2(vy,vx);
  pendingK.push(b);
}

// ── GUNGNIR SPEAR SYSTEM ──────────────────────────────────────────────────
// Spears are longer than knives, scarlet/gold, can home then release, may split
function mkSpear(x,y,vx,vy,homing=0,split=false){
  const b=getBullet();
  b.x=x;b.y=y;b.vx=vx;b.vy=vy;
  b.r=6;b.col='#cc0033';b.shape='spear';
  b.ang=Math.atan2(vy,vx);
  b.homingFrames=homing;
  b.willSplit=split;
  b.homingStrength=0.09;
  bullets.push(b);
  if(homing===0&&frame%4===0)SFX.spearThrow();
}
function spearVolley(x,y,spd,count,spreadTotal){
  // fan of count spears aimed at player with total spread angle
  const dx=P.x-x,dy=P.y-y,d=Math.sqrt(dx*dx+dy*dy)||1;
  const base=Math.atan2(dy,dx);
  for(let i=0;i<count;i++){
    const t=count>1?(i/(count-1)-.5):0;
    const a=base+t*spreadTotal;
    mkSpear(x,y,Math.cos(a)*spd,Math.sin(a)*spd,0,false);
  }
}
function spearHoming(x,y,spd,homingDur){
  // single spear that homes for homingDur frames then commits; ~35% chance to split
  const dx=P.x-x,dy=P.y-y,d=Math.sqrt(dx*dx+dy*dy)||1;
  mkSpear(x,y,dx/d*spd,dy/d*spd,homingDur,Math.random()<0.35);
}
function spearRing(x,y,n,spd,off=0){
  for(let i=0;i<n;i++){
    const a=i/n*PI2+off;
    mkSpear(x,y,Math.cos(a)*spd,Math.sin(a)*spd,0,false);
  }
}

// ── TIME STOP ──────────────────────────────────────────────────────────────
const tsEl=document.getElementById('timestopOverlay');
function triggerTS(fn){
  if(tsActive)return;
  tsActive=true;tsTimer=60;SFX.tstop();
  bullets.forEach(b=>{b.frozen=true;b._vx=b.vx;b._vy=b.vy;b.vx=0;b.vy=0;});
  fn&&fn();
  tsEl.style.cssText='transition:opacity .1s;opacity:1';
}
function releaseTS(){
  tsActive=false;tsTimer=0;SFX.tresume();
  bullets.forEach(b=>{if(b.frozen){b.vx=b._vx;b.vy=b._vy;b.frozen=false;}});
  pendingK.forEach(k=>bullets.push(k));pendingK=[];
  tsEl.style.cssText='transition:opacity .3s;opacity:0';
}

function tsCheck(s,thresholds,n,r,corners=false){
  if(tsActive)return;
  for(let i=0;i<thresholds.length;i++){
    if(!tsFired[i]&&phaseHP<phaseMaxHP*thresholds[i]){
      tsFired[i]=true;
      const isLast=corners&&i===thresholds.length-1;
      triggerTS(()=>{
        const fb=Math.atan2(bossY-P.y,bossX-P.x);
        for(let j=0;j<n+(isLast?6:0);j++){const a=fb-Math.PI/2+j/(n-1)*Math.PI,px=P.x+Math.cos(a)*r,py=P.y+Math.sin(a)*r,ang=Math.atan2(P.y-py,P.x-px);placeKnifeFreeze(px,py,Math.cos(ang)*s*1.3,Math.sin(ang)*s*1.3);}
        if(isLast)[[0,0],[W,0],[0,H],[W,H]].forEach(([cx,cy])=>{const ang=Math.atan2(P.y-cy,P.x-cx);for(let k=-2;k<=2;k++)placeKnifeFreeze(cx,cy,Math.cos(ang+k*.15)*s*1.2,Math.sin(ang+k*.15)*s*1.2);});
      });
      break;
    }
  }
}

function firePattern(){
  if(tsActive||gstate!=='playing')return;

  const d=DIFF[difficulty],s=d.bspd,dn=d.density;

}


// ── FLANDRE CLONE UPDATE + LASER STATE MACHINE ────────────────────────────
function updateFlanClones(s,dn,sp){
  flanLaserCycle++;
  const isPhase4=flandrePhase===3;
  const TELEGRAPH=40,FIRE=70,FADE=20,TOTAL=TELEGRAPH+FIRE+FADE;
  const cycleLen=TOTAL+30; // gap between volleys

  // rotate triangle in phase 4
  if(isPhase4)flanRotA+=.007;

  // update clone positions
  flanClones.forEach((fc,i)=>{
    fc.wobT++;
    const baseAngle=i/3*PI2+flanRotA-Math.PI/2;
    const radius=isPhase4?120:110;
    const wobble=Math.sin(fc.wobT*.04)*8;
    fc.x=bossX+Math.cos(baseAngle)*(radius+wobble);
    fc.y=bossY+Math.sin(baseAngle)*(isPhase4?55:60);
  });

  // fire supplementary bullet patterns
  const pat=isPhase4?'flan4_laser':'flan3_split';
  PATTERNS[pat]&&PATTERNS[pat](s,dn,sp);

  // laser state machine per clone — staggered
  flanLasers.forEach((lz,i)=>{
    const localCycle=(flanLaserCycle-lz.delay);
    if(localCycle<0)return;
    const phase=localCycle%cycleLen;

    if(phase===0){
      // start telegraph — snapshot player X? No — snapshot clone X (vertical laser from clone)
      lz.snapX=flanClones[i].x;
      lz.state='telegraph';lz.width=0;
    } else if(phase<TELEGRAPH){
      lz.state='telegraph';
      lz.width=2;
    } else if(phase===TELEGRAPH){
      lz.state='fire';lz.width=0;SFX.spark();
    } else if(phase<TELEGRAPH+FIRE){
      lz.state='fire';
      const t=(phase-TELEGRAPH)/FIRE;
      // width grows in, holds, fades out at end
      const fadeStart=.75;
      lz.width=t<.1?(t/.1)*20:t>fadeStart?20*(1-(t-fadeStart)/(1-fadeStart)):20;
      // adjust for difficulty: hard=24, lunatic=28
      const wBonus=difficulty>=3?8:difficulty>=2?4:0;
      lz.width+=t>0.1&&t<fadeStart?wBonus:0;
      // hitbox check
      if(lz.width>4&&!bombActive&&!freezeActive&&difficulty!==4){
        if(Math.abs(P.x-lz.snapX)<lz.width/2+6&&P.y>flanClones[i].y){
          playerHit();
        }
      }
    } else {
      lz.state='idle';lz.width=0;
    }
  });
}
function initBooks(count){
  books=[];
  const cols=['#ff6633','#4488ff','#88cc44','#cc88ff'];
  const OR=[70,95,70,95],OS=[.025,.02,-.022,-.018],OA=[0,Math.PI/2,Math.PI,Math.PI*1.5];
  for(let i=0;i<count;i++)books.push({a:OA[i],R:OR[i],spd:OS[i],col:cols[i],t:i*20,x:0,y:0});
  SFX.book();
}
function updateBooks(){
  const d=DIFF[difficulty],s=d.bspd*.75;
  books.forEach((bk,i)=>{
    if(!tsActive)bk.a+=bk.spd;
    bk.x=bossX+Math.cos(bk.a)*bk.R;bk.y=bossY+Math.sin(bk.a)*bk.R;
    if(tsActive)return;
    bk.t--;
    if(bk.t<=0){
      bk.t=Math.round((spellActive?55:80)/d.density);
      switch(i%4){
        case 0:aimed(bk.x,bk.y,s,3,bk.col,.18);break;
        case 1:ring(bk.x,bk.y,6,s*.8,3,bk.col,bk.a);break;
        case 2:aimed(bk.x,bk.y,s*.9,3,bk.col,.12);break;
        case 3:for(let j=0;j<3;j++){const a2=bk.a+j/3*PI2;mkBullet(bk.x,bk.y,Math.cos(a2)*s*.7,Math.sin(a2)*s*.7,3,bk.col);}break;
      }
    }
  });
}

// ── ACCESSORIES ───────────────────────────────────────────────────────────
function updateAccessories(){
  const want=score>=30000?2:score>=10000?1:0;
  while(accessories.length<want)accessories.push({a:accessories.length*Math.PI,t:30+accessories.length*20,x:0,y:0});
  if(accessories.length>want)accessories.length=want;
  const dmg=.7+.3*Math.min(1,score/300000);
  accessories.forEach((ac,i)=>{
    ac.a+=(i%2?-.045:.045);
    ac.x=P.x+Math.cos(ac.a)*30;ac.y=P.y+Math.sin(ac.a)*30;
    if(--ac.t<=0){
      ac.t=42;SFX.acc();
      if(character==='marisa'){hBeams.push({x:ac.x,y:ac.y,life:10,max:10,dmg:dmg*0.8});}
      else{const dx=bossX-ac.x,dy=bossY-ac.y,d=Math.sqrt(dx*dx+dy*dy)||1;pshots.push({x:ac.x,y:ac.y,vx:dx/d*7,vy:dy/d*7,spd:7,homing:true,dmg:dmg*.55});}
    }
  });
  hBeams=hBeams.filter(b=>{
    b.life--;
    if(Math.abs(b.x-bossX)<18&&frame%3===0)phaseHP=Math.max(0,phaseHP-Math.max(1,Math.floor(b.dmg)));
    return b.life>0;
  });
}

// ── MEILING KICK ──────────────────────────────────────────────────────────
function updateMeilingKick(){
  if(bossType!=='meiling'||!spellActive)return;
  const si=Math.floor(phase/2),maxK=SPELLS.meiling[si]?.kicks||1;
  if(mkCooldown>0){mkCooldown--;return;}
  if(mkState==='idle'){
    if(mkRemain<=0&&phaseST>120&&phaseST%Math.round(200/DIFF[difficulty].density)===0)mkRemain=maxK;
    if(mkRemain>0){mkState='telegraph';mkTimer=30;mkDir=P.x>bossX?1:-1;}
  }else if(mkState==='telegraph'){mkTimer--;flashT=4;if(mkTimer<=0){mkState='dive';mkTimer=40;}}
  else if(mkState==='dive'){
    const ty=Math.min(H-150,Math.max(200,P.y));
    bossY+=(ty-bossY)*.18;mkTimer--;
    if(Math.abs(bossY-ty)<15||mkTimer<=0){mkState='kicking';mkTimer=18;SFX.kick();}
  }
  else if(mkState==='kicking'){
    mkTimer--;
    const kx=bossX+(mkDir>0?30:-90),ky=bossY-14;
    if(P.x>kx&&P.x<kx+60&&P.y>ky&&P.y<ky+28&&difficulty!==4)playerHit();
    if(mkTimer<=0){mkState='retreat';mkTimer=35;}
  }
  else if(mkState==='retreat'){
    bossY+=(130-bossY)*.15;mkTimer--;
    if(mkTimer<=0){mkState='idle';mkRemain--;mkCooldown=mkRemain>0?50:200;}
  }
}

// ── DAI ────────────────────────────────────────────────────────────────────
function cirnoGraze(){
  if(!cirnoMode)return;

  daiAttackGraze++;
  if(daiAttackGraze>=DAI_ATTACK_GRAZE){
    daiAttackGraze=0;
    if(!daiActive){
      daiActive=true;
      daiDir=Math.random()<.5?1:-1;
      daiX=daiDir>0?-40:W+40;
      daiY=60+Math.random()*120;
      daiMode='attack';
      daiTimer=200;
      SFX.daiHeal();
      spawnMsg('Dai!','#88ffaa',false);
    }
  }

  if(cirnoShield<SHIELD_MAX){
    shieldGraze++;
    if(shieldGraze>=DAI_GRAZE_PER_BLOCK){
      shieldGraze=0;
      if(!daiActive){
        daiActive=true;daiX=-30;daiY=P.y;daiDir=1;daiTimer=150;daiMode='heal';
        SFX.daiHeal();spawnMsg('Daiyousei!','#88ffaa',true);
      }
    }
  }
}

function updateDai(){
  if(!daiActive)return;
  daiTimer--;

  if(daiMode==='attack'){
    daiX+=daiDir*5;
    if(daiTimer%12===0&&daiX>0&&daiX<W){
      const dx=bossX-daiX,dy=bossY-daiY,d=Math.sqrt(dx*dx+dy*dy)||1;
      const spd=6.5,baseA=Math.atan2(dy,dx);
      for(let s=-1;s<=1;s++){
        const a=baseA+s*.12;
        daiKunais.push({x:daiX,y:daiY,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:100});
      }
      spawnPart(daiX,daiY,'#88ffaa',6);
      SFX.acc();
    }
    if(daiX<-50||daiX>W+50||daiTimer<=0){daiActive=false;}
  } else {
    daiX+=daiDir*4;
    if(daiX>P.x-25&&daiX<P.x+25&&daiTimer>80&&cirnoShield<SHIELD_MAX){
      cirnoShield=Math.min(SHIELD_MAX,cirnoShield+1);
      invT=Math.max(invT,60);
      spawnPart(P.x,P.y,'#88ffaa',20);
      spawnMsg('SHIELD REPAIRED','#88ffaa',false);
      SFX.shieldUp();
    }
    if(daiX>W+40||daiTimer<=0){daiActive=false;}
  }

  daiKunais=daiKunais.filter(k=>{
    k.x+=k.vx;k.y+=k.vy;k.life--;
    if(k.x<-20||k.x>W+20||k.y<-20||k.y>H+20||k.life<=0)return false;
    const dx=k.x-bossX,dy=k.y-bossY;
    if(dx*dx+dy*dy<BOSS_HIT_R2){
      phaseHP=Math.max(0,phaseHP-8);
      spawnPart(k.x,k.y,'#88ffaa',6);
      return false;
    }
    return true;
  });
}

// ── CIRNO PLAYER HIT ──────────────────────────────────────────────────────
function cirnoPlayerHit(unblockable=false){
  if(invT>0||gstate!=='playing')return;
  if(freezeActive)return;

  if(!unblockable&&shieldActive&&cirnoShield>0){
    cirnoShield--;invT=30;flashT=8;
    SFX.shieldHit();spawnPart(P.x,P.y,'#aaeeff',14);
    if(cirnoShield===0){
      spawnMsg('SHIELD BROKEN!','#ff4444',true);SFX.shieldBreak();
    } else {
      spawnMsg('SHIELD -1','#88bbff',false);
    }
    bullets.forEach(b=>b.active=false);bullets=[];pendingK=[];
    if(spellActive)spellHit=true;
    return;
  }

  invT=999;flashT=25;
  SFX.hit();SFX.shieldBreak();
  spawnPart(P.x,P.y,'#aaeeff',30);spawnPart(P.x,P.y,'#ffffff',20);
  bullets.forEach(b=>b.active=false);bullets=[];pendingK=[];

}

// ── BOSS SPECIALS ─────────────────────────────────────────────────────────
function mkUnblockable(x,y,vx,vy,r,col,shape){
  const b=getBullet();
  b.x=x;b.y=y;b.vx=vx;b.vy=vy;b.r=r||8;b.col=col||'#ff4466';
  b.shape=shape||'circle';b.unblockable=true;
  b.ang=shape==='knife'?Math.atan2(vy,vx):0;
  bullets.push(b);
}

function fireFantasyToss(){
  const spread=Math.PI*.55;
  for(let i=0;i<6;i++){
    const a=Math.PI/2-spread/2+i/(5)*spread;
    mkUnblockable(bossX,bossY,Math.cos(a)*1.8,Math.sin(a)*1.8,10,'#ff88aa');
  }
  spawnPart(bossX,bossY,'#ff4466',16);
  SFX.bomb();
}

function startMasterSparkBeam(){
  bossSpecialBeam={x:bossX,life:90,max:90,w:0};
  SFX.spark();
  spawnMsg('SPARK!','#ffdd44',false);
}

function updateBossSpecial(){
  if(!dualActive||!cirnoMode)return;
  const sp=DUAL_SPELLS[dualSpellIdx%DUAL_SPELLS.length];
  const interval=Math.max(180,Math.round((sp.specialInterval||500)/Math.max(.5,DIFF[difficulty].density)));

  if(bossSpecialState==='idle'){
    bossSpecialTimer++;
    if(bossSpecialTimer>=interval){
      bossSpecialTimer=0;bossSpecialState='telegraph';bossSpecialTelegraph=40;
      spawnPart(bossX,bossY,sp.col,8);
    }
  } else if(bossSpecialState==='telegraph'){
    bossSpecialTelegraph--;flashT=Math.max(flashT,3);
    if(bossSpecialTelegraph<=0){
      bossSpecialState='firing';
      if(sp.who==='reimu')fireFantasyToss();
      else startMasterSparkBeam();
      bossSpecialTimer=0;
    }
  } else if(bossSpecialState==='firing'){
    bossSpecialTimer++;
    if(bossSpecialBeam){
      const t=bossSpecialBeam.life/bossSpecialBeam.max;
      bossSpecialBeam.w=t>.8?80*(1-(t-.8)/.2)*1:t<.15?80*(1-t/.15):80;
      bossSpecialBeam.x=bossX;bossSpecialBeam.life--;
      if(bossSpecialBeam.life>0){
        const bw=bossSpecialBeam.w*.5;
        if(Math.abs(P.x-bossSpecialBeam.x)<bw+8&&P.y>bossY&&invT<=0)cirnoPlayerHit(true);
      }
      if(bossSpecialBeam.life<=0){bossSpecialBeam=null;bossSpecialState='idle';bossSpecialTimer=0;}
    } else {
      if(bossSpecialTimer>60){bossSpecialState='idle';bossSpecialTimer=0;}
    }
  }
}

// ── SCREEN CRACK GENERATOR ─────────────────────────────────────────────────
function generateCrack(){
  crackLines=[];
  // epicenter near center-top (where flandre is)
  const ex=W/2+(-20+Math.random()*40),ey=H*.22;
  const numRays=7+Math.floor(Math.random()*5);
  for(let r=0;r<numRays;r++){
    const baseA=r/numRays*PI2+Math.random()*.3;
    let cx=ex,cy=ey;
    const segs=4+Math.floor(Math.random()*4);
    for(let s=0;s<segs;s++){
      const len=30+Math.random()*60;
      const jitter=(Math.random()-.5)*.5;
      const nx=cx+Math.cos(baseA+jitter)*len;
      const ny=cy+Math.sin(baseA+jitter)*len;
      crackLines.push({x1:cx,y1:cy,x2:nx,y2:ny});
      // branch
      if(Math.random()<.45){
        const ba2=baseA+jitter+(Math.random()-.5)*1.2;
        const bl=15+Math.random()*35;
        crackLines.push({x1:nx,y1:ny,x2:nx+Math.cos(ba2)*bl,y2:ny+Math.sin(ba2)*bl});
      }
      cx=nx;cy=ny;
    }
  }
}

function fireFlandre(){
  const d=DIFF[Math.min(difficulty,3)];
  const s=d.bspd,dn=Math.min(d.density,.9);
  const idx=phaseHP>phaseMaxHP*.75?0:phaseHP>phaseMaxHP*.5?1:phaseHP>phaseMaxHP*.25?2:3;
  if(idx!==flandrePhase){
    flandrePhase=idx;spellHit=false;spellBombed=false;
    bullets.forEach(b=>b.active=false);bullets=[];spiralA=0;crossA=0;tsFired=[false,false,false,false];

    if(idx===1){
      // Second spell: show spell1 banter first
      startDlg(DLG.flandre.spell1,()=>{
        const sp=SPELLS.flandre[idx];showSpellFlash(sp);SFX.spellcard();
      });
    } else if(idx===3){
      // Final spell: prefinal banter → crack → spell
      startDlg(DLG.flandre.prefinal,()=>{
        // screen crack!
        generateCrack();crackT=220;SFX.crackBoom();
        // wait for crack to register visually, then launch
        setTimeout(()=>{
          const sp=SPELLS.flandre[3];
          showSpellFlash(sp);SFX.spellcard();
          // init three flandre clones
          flanSplitMode=true;flanRotA=0;flanLaserCycle=0;
          const cols=['#ff44ff','#ff8800','#aa44ff'];
          flanClones=cols.map((col,i)=>({
            x:bossX+Math.cos(i/3*PI2)*110,
            y:bossY+Math.sin(i/3*PI2)*60,
            col,wobA:i/3*PI2,wobT:0
          }));
          flanLasers=flanClones.map((fc,i)=>({
            state:'idle',t:0,snapX:fc.x,width:0,
            delay:i*55,  // staggered activation
            fired:0
          }));
        },400);
      });
    } else {
      const sp=SPELLS.flandre[idx];showSpellFlash(sp);SFX.spellcard();
      if(idx===2){
        // phase 3: three clones triangle, no rotation yet
        flanSplitMode=true;flanRotA=0;flanLaserCycle=0;
        const cols=['#ff44ff','#ff8800','#aa44ff'];
        flanClones=cols.map((col,i)=>({
          x:bossX+Math.cos(i/3*PI2-Math.PI/2)*110,
          y:bossY+Math.sin(i/3*PI2-Math.PI/2)*65,
          col,wobA:i/3*PI2,wobT:0
        }));
        flanLasers=flanClones.map((fc,i)=>({
          state:'idle',t:0,snapX:fc.x,width:0,
          delay:i*60,fired:0
        }));
      } else {
        flanSplitMode=false;flanClones=[];flanLasers=[];
      }
    }
  }
  const sp=SPELLS.flandre[idx];
  if(flanSplitMode){updateFlanClones(s,dn,sp);}
  else{PATTERNS[sp.pat]&&PATTERNS[sp.pat](s,dn,sp);}
}

// ── MAIN UPDATE ───────────────────────────────────────────────────────────
const keys={};
function update(){
  if(gstate==='paused')return;
  if(gstate==='dialogue'){updateDlg();return;}
  if(gstate==='warning'){
    if(--warningTimer<=0){gstate='playing';startFlandre();startDlg(DLG.flandre.spell,null);}
    return;
  }
  if(gstate!=='playing')return;
  if(tsActive){if(--tsTimer<=0)releaseTS();return;}
  frame++;phaseST++;

  const d=DIFF[difficulty];
  if(!cirnoMode){const focused=keys.ShiftLeft||keys.ShiftRight;character=focused?'marisa':'reimu';}

  if(cirnoMode){
    shieldActive=(keys.ShiftLeft||keys.ShiftRight)&&cirnoShield>0;
    if(shieldActive&&!shieldWasUp){SFX.shieldUp();shieldWasUp=true;}
    if(!shieldActive)shieldWasUp=false;
  }

  const spd=cirnoMode?(shieldActive?d.spd*.4:d.spd*.85):(character==='marisa'?d.spd*1.25:d.spd);
  if(keys.KeyA)P.x=Math.max(20,P.x-spd);
  if(keys.KeyD)P.x=Math.min(W-20,P.x+spd);
  if(keys.KeyW)P.y=Math.max(20,P.y-spd);
  if(keys.KeyS)P.y=Math.min(H-30,P.y+spd);

  if(keys.KeyG&&shotT<=0&&!(cirnoMode&&shieldActive)){
    if(cirnoMode){
      const dmg=0.65;
      for(let i=-1;i<=1;i++)pshots.push({x:P.x+i*5,y:P.y-5,spd:13,sx:i*.08,dmg});
      shotT=7;
    }else{
      const dmg=character==="marisa"?1:1.2;
      if(character==="marisa"){for(let i=-2;i<=2;i++)pshots.push({x:P.x+i*4,y:P.y-5,spd:16,sx:i*.05,marisa:true,dmg});shotT=4;}
      else{pshots.push({x:P.x,y:P.y,spd:12,sx:0,dmg});pshots.push({x:P.x-8,y:P.y+5,spd:11,sx:-.5,dmg});pshots.push({x:P.x+8,y:P.y+5,spd:11,sx:.5,dmg});shotT=5;}
    }
    if(frame%3===0)SFX.shoot();
  }
  if(shotT>0)shotT--;

  if(!cirnoMode)updateAccessories();

  if(cirnoMode){
    if(freezeCooldown>0)freezeCooldown--;
    if(freezeActive){if(--freezeTimer<=0)releaseFreeze();}
    if(keys.KeyF&&!freezeActive&&freezeCooldown===0&&!shieldActive)triggerFreeze();
    updateDai();
  } else {
    if(keys.KeyF&&!bombActive&&bombs>0){
      bombActive=true;bombs--;if(spellActive)spellBombed=true;
      if(tsActive)releaseTS();
      bullets.forEach(b=>b.active=false);bullets=[];pendingK=[];invT=Math.max(invT,60);
      const dmg=Math.max(character==='marisa'?40:30,Math.floor(phaseMaxHP*(character==='marisa'?.18:.15)));
      phaseHP=Math.max(1,phaseHP-dmg);
      if(character==='marisa'){
        bombTimer=90;bombVisT=90;spawnMsg('SPARK -'+dmg,'#ffdd44',true);SFX.spark();
        spawnPart(P.x,P.y,'#ffdd44',30);sparkBeam={x:P.x,w:40,life:90,max:90};
        showSpellFlash(null,'Love Sign "Master Spark"','恋符「マスタースパーク」');
      }else{
        bombTimer=120;bombVisT=120;spawnMsg('BOMB -'+dmg,'#ff4400',true);SFX.bomb();
        spawnPart(P.x,P.y,'#ffffff',40);spawnPart(bossX,bossY,'#ff4400',25);
        showSpellFlash(null,'Spirit Sign "Fantasy Seal"','夢符「封魔陣」');
        const orbAngles=[Math.PI*1.25,Math.PI*1.75,Math.PI*.75,Math.PI*.25];
        bombOrbs=['#ff4466','#ffffff','#ffdd44','#ff88aa'].map((col,i)=>({
          x:P.x+Math.cos(orbAngles[i])*60,y:P.y+Math.sin(orbAngles[i])*60,
          vx:Math.cos(orbAngles[i])*2,vy:Math.sin(orbAngles[i])*2,
          col,life:1,pulse:i*Math.PI/2,trail:[]
        }));
      }
    }
    if(bombActive&&--bombTimer<=0){bombActive=false;sparkBeam=null;if(character==='marisa')bombOrbs=[];}
    if(bombVisT>0)bombVisT--;
  }

  if(sparkBeam){
    const t=1-sparkBeam.life/sparkBeam.max;
    sparkBeam.w=t<.2?40+t*5*200:t<.8?80:80*(1-(t-.8)/.2);
    sparkBeam.x=P.x;sparkBeam.life--;
    if(sparkBeam.life>0&&frame%10===0){phaseHP=Math.max(1,phaseHP-Math.max(3,Math.floor(phaseMaxHP*.012)));spawnPart(bossX,bossY,'#ffdd44',4);}
  }

  const sc=bossType==='patchouli'?.35:bossType==='flandre'?.9:1;
  if(mkState==='idle'||mkState==='retreat'){bossX+=bossDX*sc;bossWob+=bossType==='patchouli'?.02:.05;if(bossX>W-60||bossX<60)bossDX*=-1;}
  if(mkState==='idle'||mkState==='telegraph')bossY=130+Math.sin(bossWob)*(bossType==='patchouli'?6:bossType==='flandre'?20:15);
  if(bossType==='meiling')updateMeilingKick();
  if(phaseHP>0){if(dualActive)fireDual();else firePattern();}
  if(frame%18===0){sballs.push({x:20+Math.random()*(W-40),y:-10,vy:2+Math.random()*1.5,val:200,pulse:Math.random()*PI2});}

  const cirnoDmgMult=cirnoMode?.6:1;
  pshots=pshots.filter(p=>{
    if(p.homing){const dx=bossX-p.x,dy=bossY-p.y,d=Math.sqrt(dx*dx+dy*dy)||1;p.vx=p.vx*.88+dx/d*p.spd*.12;p.vy=p.vy*.88+dy/d*p.spd*.12;p.x+=p.vx;p.y+=p.vy;}
    else{p.y-=p.spd;p.x+=p.sx;}
    if(p.y<-20||p.y>H+20||p.x<-20||p.x>W+20)return false;
    const dx=p.x-bossX,dy=p.y-bossY;
    if(dx*dx+dy*dy<BOSS_HIT_R2){phaseHP=Math.max(0,phaseHP-Math.max(1,Math.floor((p.dmg||1)*(p.dmgMult||1)*cirnoDmgMult)));spawnPart(p.x,p.y,'#aaeeff',3);return false;}
    return true;
  });

  if(phaseHP<=0){
    if(cirnoMode){
      if(dualActive){
        if(spellActive&&!spellHit&&!spellBombed){
          const fBonus=freezePerfect?3000:0;
          score+=5000+fBonus;
          spawnMsg('FREEZE PERFECT! +'+(5000+fBonus),DUAL_SPELLS[dualSpellIdx%DUAL_SPELLS.length].col,true);
        }
        dualSpellIdx++;
        if(dualSpellIdx>=DUAL_SPELLS.length){
          startDlg(CIRNO_DLG.final.defeat,()=>{gstate='truewin';showEnd();});
        } else {
          const sp=DUAL_SPELLS[dualSpellIdx%DUAL_SPELLS.length];
          phaseHP=getPhaseHP(0)*3;phaseMaxHP=phaseHP;
          phaseST=0;spiralA=0;spellHit=false;spellBombed=false;freezePerfect=true;
          bullets.forEach(b=>b.active=false);bullets=[];
          bossType=sp.who==='reimu'?'reimu':'marisa';
          bossX=W/2;
          bossSpecialTimer=0;bossSpecialState='idle';bossSpecialBeam=null;cirnoSpellDlgShown=false;
          showSpellFlash(sp);SFX.spellcard();score+=500;
        }
      } else {
        if(spellActive&&!spellHit&&!spellBombed){
          const fBonus=freezePerfect?2000:0;
          score+=5000+fBonus;
          if(cirnoShield<SHIELD_MAX){cirnoShield++;spawnMsg('SPELL CAPTURE! SHIELD +1'+(fBonus?' +FREEZE':''),SPELLS[bossType]?.[Math.floor(phase/2)]?.col||'#ffd700',true);}
          else{spawnMsg('SPELL CAPTURE!'+(fBonus?' +FREEZE BONUS':''),SPELLS[bossType]?.[Math.floor(phase/2)]?.col||'#ffd700',true);}
        }
        score+=500;
        if(phase>=1){advanceCirnoStage();}
        else{startPhase(phase+1);}
      }
    } else if(bossType==='flandre'){
      if(gstate==='playing'){
        const dlg=difficulty===4?DLG.flandre.defeat_immortal:DLG.flandre.defeat;
        startDlg(dlg,()=>{gstate='truewin';showEnd();});
      }
    } else if(phase>=5){
      // boss fully defeated — give a bomb for the next fight
      bombs=Math.min(4,bombs+1);spawnMsg('BOSS CLEAR! +1 BOMB','#ffd700',false);
      startDlg(DLG[bossType]?.defeat,()=>{gstate='win';stopMusic();setTimeout(()=>{warningTimer=240;gstate='warning';SFX.warn();},1200);});
    } else {
      if(spellActive&&!spellHit&&!spellBombed){
        const sp=SPELLS[bossType][Math.floor(phase/2)];
        score+=5000;lives=Math.min(4,lives+1);
        spawnMsg('SPELL CAPTURE! +LIFE',sp?.col||'#ffd700',true);
      } else if(spellActive){
        // defeated the spell but didn't capture — consolation bomb
        bombs=Math.min(4,bombs+1);
        spawnMsg('SPELL CLEAR! +1 BOMB','#aaddff',false);
      }
      score+=500;startPhase(phase+1);
    }
  }

  if(flashT>0)flashT--;if(invT>0)invT--;if(crackT>0)crackT--;
  const activeBullets=[];
  const splitQueue=[];  // spears that split this frame — added after loop
  for(let i=0;i<bullets.length;i++){
    const b=bullets[i];
    if(!b.active)continue;
    if(!b.frozen){
      // ── SPEAR HOMING: steer toward player, then release ──
      if(b.shape==='spear'&&b.homingFrames>0){
        b.homingFrames--;
        const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy)||1;
        const dx=P.x-b.x,dy=P.y-b.y,dd=Math.sqrt(dx*dx+dy*dy)||1;
        b.vx=b.vx*(1-b.homingStrength)+(dx/dd)*spd*b.homingStrength;
        b.vy=b.vy*(1-b.homingStrength)+(dy/dd)*spd*b.homingStrength;
        // renorm to original speed
        const cur=Math.sqrt(b.vx*b.vx+b.vy*b.vy)||1;
        b.vx=b.vx/cur*spd; b.vy=b.vy/cur*spd;
        b.ang=Math.atan2(b.vy,b.vx);
        if(b.homingFrames===0){
          // release — possibly split
          if(b.willSplit){
            const offsets=[-0.22,0.22];
            offsets.forEach(off=>{
              const a=b.ang+off;
              const spd2=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
              const nb=getBullet();
              nb.x=b.x;nb.y=b.y;
              nb.vx=Math.cos(a)*spd2;nb.vy=Math.sin(a)*spd2;
              nb.r=5;nb.col='#ff8822';nb.shape='spear';nb.ang=a;
              nb.homingFrames=0;nb.willSplit=false;nb.homingStrength=0;
              splitQueue.push(nb);
            });
            // original continues straight, slightly brighter
            b.col='#ff4444';
            SFX.spearSplit();
          }
        }
      } else if(b.shape==='spear'){
        b.ang=Math.atan2(b.vy,b.vx); // keep ang fresh
      }
      b.x+=b.vx;b.y+=b.vy;
    }
    if(b.x<-20||b.x>W+20||b.y<-20||b.y>H+20){b.active=false;continue;}
    const gx=b.x-P.x,gy=b.y-P.y,gd2=gx*gx+gy*gy;
    // ── HITBOX FIX: graze outer ring 20px normal / 24px shield; hitbox 10px radius ──
    const grazeOuter=cirnoMode&&shieldActive?576:400;
    if(gd2<grazeOuter&&gd2>100&&!b.grazed&&!b.frozen){
      b.grazed=true;graze++;score+=cirnoMode&&shieldActive?100:50;SFX.graze();
      if(cirnoMode)cirnoGraze();
    }
    if(gd2<100&&!bombActive&&!freezeActive&&difficulty!==4){
      if(cirnoMode&&b.unblockable){cirnoPlayerHit(true);b.active=false;continue;}
      else{playerHit();b.active=false;continue;}
    }
    activeBullets.push(b);
  }
  // flush split spears (can't push mid-loop safely with index iteration)
  splitQueue.forEach(nb=>{nb.active=true;activeBullets.push(nb);});
  bullets=activeBullets;

  if(!cirnoMode&&spellActive&&!spellDlgShown&&phaseST===60&&bossType!=='flandre'&&Math.floor(phase/2)===0){
    spellDlgShown=true;
    const lines=DLG[bossType]?.spell;
    if(lines)startDlg(lines,null);
  }
  if(cirnoMode&&spellActive&&!cirnoSpellDlgShown&&phaseST===60){
    cirnoSpellDlgShown=true;
    let lines=null;
    if(dualActive){
      const pat=DUAL_SPELLS[dualSpellIdx%DUAL_SPELLS.length].pat;
      lines=CIRNO_SPELL_DLG[pat];
    } else if(Math.floor(phase/2)===0){
      lines=CIRNO_SPELL_DLG[bossType];
    }
    if(lines)startDlg(lines,null);
  }

  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.vx*=.96;p.life-=.03;return p.life>0;});
  fmsgs=fmsgs.filter(m=>{m.y+=m.vy;m.life-=.02;return m.life>0;});
  sballs=sballs.filter(sb=>{
    sb.y+=sb.vy;sb.pulse+=.08;
    const dx=sb.x-P.x,dy=sb.y-P.y;
    if(dx*dx+dy*dy<256){score+=sb.val;SFX.collect();spawnPart(sb.x,sb.y,'#ff4466',5);return false;}
    return sb.y<H+20;
  });
}

// ── DRAWING ───────────────────────────────────────────────────────────────
function bgGrad(y0,y1,c0,c1){const g=ctx.createLinearGradient(0,y0,0,y1);g.addColorStop(0,c0);g.addColorStop(1,c1);return g;}

function drawBgMeiling(){
  const sky=bgGrad(0,H*.55,'#1a0a2e','#4a1f5a');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H*.55);
  const gnd=bgGrad(H*.55,H,'#1a2a10','#0d1a08');
  ctx.fillStyle=gnd;ctx.fillRect(0,H*.55,W,H*.45);
  ctx.save();ctx.globalAlpha=.7;
  const mx=W*.72,my=80,mr=34;
  ctx.fillStyle='#ffe8c0';ctx.beginPath();ctx.arc(mx,my,mr,0,PI2);ctx.fill();
  ctx.fillStyle='#ffcc8888';ctx.beginPath();ctx.arc(mx,my,mr+8,0,PI2);ctx.fill();
  ctx.restore();
  ctx.save();ctx.globalAlpha=.13;ctx.fillStyle='#cc88ff';
  [[60,55,120,28],[240,40,90,22],[350,70,140,30],[80,90,70,18]].forEach(([cx,cy,cw,ch])=>{
    const ox=(frame*0.18)%W;
    ctx.beginPath();ctx.ellipse((cx+ox)%W,cy,cw,ch,0,0,PI2);ctx.fill();
  });
  ctx.restore();
  ctx.save();ctx.strokeStyle='#2a3a1a';ctx.lineWidth=1;
  for(let i=0;i<7;i++){
    const y=H*.57+i*22,w=30+i*18;
    ctx.fillStyle=i%2===0?'#1e2e12':'#192610';
    ctx.fillRect(W/2-w,y,w*2,20);
  }
  ctx.restore();
  ctx.save();
  [[0,H*.4,40,H*.6],[W-40,H*.4,40,H*.6]].forEach(([hx,hy,hw,hh])=>{
    const g2=bgGrad(hy,hy+hh,'#1a3a0a','#0d1f05');
    ctx.fillStyle=g2;ctx.fillRect(hx,hy,hw,hh);
    ctx.fillStyle='#2a5a15';
    for(let r=0;r<20;r++){const tx=hx+Math.sin(r*137)*hw*.4+hw*.4,ty=hy+r*hh/20;ctx.beginPath();ctx.arc(tx,ty,4+Math.sin(r*7)*2,0,PI2);ctx.fill();}
  });
  ctx.restore();
  ctx.save();
  [W/2-60,W/2+36].forEach(px=>{
    ctx.fillStyle='#3a2a1a';ctx.fillRect(px,H*.35,24,H*.5);
    ctx.fillStyle='#5a3a2a';ctx.fillRect(px-4,H*.33,32,14);
    ctx.fillStyle='#7a4a3a';ctx.fillRect(px-2,H*.3,28,8);
    ctx.strokeStyle='#2a1a0a';ctx.lineWidth=1;
    for(let r=0;r<8;r++){ctx.beginPath();ctx.moveTo(px,H*.35+r*18);ctx.lineTo(px+24,H*.35+r*18);ctx.stroke();}
  });
  ctx.restore();
  ctx.save();ctx.globalAlpha=.35;ctx.fillStyle='#0d0510';
  ctx.fillRect(W*.3,H*.22,W*.4,H*.25);
  [[W*.32,H*.1],[W*.65,H*.08]].forEach(([tx,ty])=>{ctx.fillRect(tx,ty,18,H*.25);ctx.fillRect(tx-5,ty-8,28,10);});
  ctx.restore();
}

function drawBgPatchouli(){
  ctx.fillStyle='#08060f';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.strokeStyle='#1a1030';ctx.lineWidth=3;
  for(let i=0;i<4;i++){
    const ax=W*i/3;
    ctx.beginPath();ctx.moveTo(ax,0);ctx.quadraticCurveTo(ax+W/6,H*.12,ax+W/3,0);ctx.stroke();
  }
  ctx.restore();
  ctx.save();
  [[0,0,55,H],[W-55,0,55,H]].forEach(([sx,sy,sw,sh])=>{
    ctx.fillStyle='#110a04';ctx.fillRect(sx,sy,sw,sh);
    for(let r=0;r<9;r++){
      const ry=r*(H/9);
      ctx.fillStyle='#1e1206';ctx.fillRect(sx,ry,sw,4);
      let bx=sx+2;
      while(bx<sx+sw-4){
        const bw=4+Math.floor(Math.sin(bx*r*7+r)*2);
        const bh=22+Math.floor(Math.sin(bx*r+13)*8);
        const cols=['#4a1a08','#1a3a1a','#1a1a4a','#3a2a08','#3a0a2a'];
        ctx.fillStyle=cols[(r*7+Math.floor(bx/6))%cols.length];
        ctx.fillRect(bx,ry+4,bw,bh);
        ctx.fillStyle='#ffffff08';ctx.fillRect(bx,ry+4,1,bh);
        bx+=bw+1;
      }
    }
  });
  ctx.restore();
  ctx.save();ctx.globalAlpha=.12;ctx.strokeStyle='#9966cc';ctx.lineWidth=1;
  const fcx=W/2,fcy=H*.88;
  ctx.beginPath();ctx.arc(fcx,fcy,80,0,PI2);ctx.stroke();
  ctx.beginPath();ctx.arc(fcx,fcy,55,0,PI2);ctx.stroke();
  for(let i=0;i<6;i++){const a=i/6*PI2;ctx.beginPath();ctx.moveTo(fcx+Math.cos(a)*55,fcy+Math.sin(a)*55);ctx.lineTo(fcx+Math.cos(a+PI2/6)*55,fcy+Math.sin(a+PI2/6)*55);ctx.stroke();}
  ctx.restore();
  ctx.save();
  [[120,200,.9],[340,160,.7],[80,310,.5],[390,280,.6],[200,380,.4]].forEach(([tx,ty,spd],i)=>{
    const fy=(ty+frame*spd*.4)%H;
    const fa=Math.sin(frame*.02+i)*0.3;
    ctx.globalAlpha=.28;ctx.save();ctx.translate(tx,fy);ctx.rotate(fa);
    ctx.fillStyle='#2a1a4a';ctx.fillRect(-10,-7,20,14);
    ctx.fillStyle='#3a2a5a';ctx.fillRect(-10,-7,3,14);
    ctx.strokeStyle='#9966cc44';ctx.lineWidth=1;ctx.strokeRect(-10,-7,20,14);
    ctx.restore();
  });
  ctx.restore();
  ctx.save();
  STARS.forEach((s,i)=>{
    const y=(s.x*.8+frame*s.spd*.3)%H;
    ctx.globalAlpha=s.br*.4;ctx.fillStyle='#cc99ff';
    ctx.beginPath();ctx.arc(s.x,y,1,0,PI2);ctx.fill();
  });
  ctx.restore();
  ctx.globalAlpha=1;
}

function drawBgRemilia(){
  ctx.fillStyle='#0d0004';ctx.fillRect(0,0,W,H);
  const wall=bgGrad(0,H*.7,'#1a0008','#0d0004');
  ctx.fillStyle=wall;ctx.fillRect(0,0,W,H*.7);
  ctx.save();const rwx=W/2,rwy=80,rwr=55;
  ctx.globalAlpha=.22;
  for(let i=0;i<12;i++){
    const a=i/12*PI2,a2=(i+1)/12*PI2;
    ctx.fillStyle=i%3===0?'#cc003388':i%3===1?'#88002288':'#440011aa';
    ctx.beginPath();ctx.moveTo(rwx,rwy);ctx.arc(rwx,rwy,rwr,a,a2);ctx.closePath();ctx.fill();
  }
  ctx.strokeStyle='#440022';ctx.lineWidth=1.5;
  for(let i=0;i<6;i++){const a=i/6*PI2;ctx.beginPath();ctx.moveTo(rwx,rwy);ctx.lineTo(rwx+Math.cos(a)*rwr,rwy+Math.sin(a)*rwr);ctx.stroke();}
  ctx.beginPath();ctx.arc(rwx,rwy,rwr,0,PI2);ctx.stroke();
  ctx.beginPath();ctx.arc(rwx,rwy,rwr*.5,0,PI2);ctx.stroke();
  ctx.restore();
  ctx.save();
  [30,W-54].forEach(px=>{
    for(let p=0;p<3;p++){
      const py=H*.15+p*(H*.25);
      ctx.fillStyle='#1a0008';ctx.fillRect(px,py,24,H*.22);
      ctx.fillStyle='#2a000e';ctx.fillRect(px,py,4,H*.22);
      ctx.fillStyle='#220009';ctx.fillRect(px,py,24,6);ctx.fillRect(px,py+H*.22-6,24,6);
    }
  });
  ctx.restore();
  ctx.save();
  const carp=bgGrad(H*.5,H,'#1a0008','#0d0004');
  ctx.fillStyle=carp;
  ctx.fillRect(W*.3,H*.5,W*.4,H*.5);
  ctx.strokeStyle='#3a0015';ctx.lineWidth=1;
  ctx.strokeRect(W*.3+3,H*.5+3,W*.4-6,H*.5-6);
  ctx.restore();
  ctx.save();
  [[55,H*.45],[W-55,H*.45],[55,H*.65],[W-55,H*.65]].forEach(([cx,cy])=>{
    const flicker=.7+Math.sin(rf*.18+cx)*.3;
    ctx.globalAlpha=.18*flicker;
    const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,45);
    cg.addColorStop(0,'#ff8800');cg.addColorStop(1,'transparent');
    ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,45,0,PI2);ctx.fill();
    ctx.globalAlpha=flicker*.9;ctx.fillStyle='#ffe0a0';
    ctx.fillRect(cx-2,cy-10,4,12);
    ctx.fillStyle='#ff8800';ctx.beginPath();ctx.arc(cx,cy-11,3,0,PI2);ctx.fill();
  });
  ctx.restore();
  ctx.globalAlpha=1;
}

function drawBgFlandre(){
  ctx.fillStyle='#04020a';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.strokeStyle='#110818';ctx.lineWidth=1;
  for(let r=0;r<12;r++)for(let c=0;c<8;c++){
    const ox=(r%2===0?0:30);
    ctx.strokeRect(c*60+ox,r*55,58,52);
  }
  ctx.restore();
  ctx.save();ctx.strokeStyle='#1a0a28';ctx.lineWidth=1;
  [[60,80,130,160],[280,40,310,130],[380,200,400,310],[100,300,180,400],[200,150,240,220]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath();ctx.moveTo(x1,y1);
    const mx=(x1+x2)/2+((x2-x1)*.2),my=(y1+y2)/2+((y2-y1)*.1);
    ctx.quadraticCurveTo(mx,my,x2,y2);ctx.stroke();
  });
  ctx.restore();
  ctx.save();ctx.strokeStyle='#2a1a3a';ctx.lineWidth=2;
  [60,160,300,400].forEach(cx=>{
    const len=80+Math.sin(cx)*.3*20;
    for(let s=0;s<len;s+=8){
      ctx.beginPath();ctx.arc(cx+Math.sin(s*.3)*3,s,3,0,PI2);ctx.stroke();
    }
  });
  ctx.restore();
  ctx.save();
  [[W*.2,H*.85,60],[W*.65,H*.9,80],[W*.45,H*.78,50]].forEach(([gx,gy,gr])=>{
    const pulse=.5+Math.sin(rf*.04+gx)*.5;
    ctx.globalAlpha=.12*pulse;
    const gg=ctx.createRadialGradient(gx,gy,0,gx,gy,gr);
    gg.addColorStop(0,'#aa00ff');gg.addColorStop(1,'transparent');
    ctx.fillStyle=gg;ctx.beginPath();ctx.arc(gx,gy,gr,0,PI2);ctx.fill();
  });
  ctx.restore();
  ctx.save();ctx.globalAlpha=.05;ctx.fillStyle='#cc00ff';ctx.font='bold 120px Cinzel';ctx.textAlign='center';
  ctx.fillText('⑨',W/2,H*.6);ctx.restore();
  ctx.globalAlpha=1;
}

function drawBgCellar(){
  ctx.fillStyle='#080410';ctx.fillRect(0,0,W,H);
  ctx.save();
  for(let r=0;r<16;r++){
    const ry=r*40,ox=r%2===0?0:24;
    for(let c=-1;c<9;c++){
      const bx=c*48+ox;
      ctx.fillStyle=r%3===0?'#1a0808':'#160606';
      ctx.fillRect(bx+1,ry+1,46,37);
      ctx.strokeStyle='#0d0303';ctx.lineWidth=1;ctx.strokeRect(bx+1,ry+1,46,37);
    }
  }
  ctx.restore();
  ctx.save();ctx.fillStyle='#0a0208';
  for(let i=0;i<3;i++){
    const ax=W*(i+.5)/3;
    ctx.beginPath();ctx.arc(ax,0,W/4,0,Math.PI);ctx.fill();
  }
  ctx.restore();
  ctx.save();
  [[0,H*.3,45,H*.7],[W-45,H*.3,45,H*.7]].forEach(([rx,ry,rw,rh])=>{
    ctx.fillStyle='#1a0808';ctx.fillRect(rx,ry,rw,rh);
    for(let b=0;b<6;b++){
      ctx.fillStyle='#2a1010';ctx.fillRect(rx,ry+b*(rh/6),rw,3);
    }
    for(let b=0;b<5;b++){
      const by=ry+b*(rh/6)+5,bx=rx+rw*.2;
      ctx.fillStyle='#0a1a08';ctx.fillRect(bx,by,10,28);
      ctx.fillStyle='#4a0808';ctx.fillRect(bx+2,by-4,6,6);
      ctx.fillStyle='#081a0a';ctx.fillRect(bx+14,by+4,10,24);
      ctx.fillStyle='#3a0808';ctx.fillRect(bx+16,by,6,6);
    }
  });
  ctx.restore();
  ctx.save();
  [W*.25,W*.5,W*.75].forEach((lx,i)=>{
    const swing=Math.sin(rf*.02+i*2.1)*8;
    const lx2=lx+swing,ly=30;
    const flicker=.65+Math.sin(rf*.17+lx)*.35;
    ctx.globalAlpha=.14*flicker;
    const lg=ctx.createRadialGradient(lx2,ly+20,0,lx2,ly+20,90);
    lg.addColorStop(0,'#ff8840');lg.addColorStop(1,'transparent');
    ctx.fillStyle=lg;ctx.beginPath();ctx.arc(lx2,ly+20,90,0,PI2);ctx.fill();
    ctx.globalAlpha=.7;ctx.strokeStyle='#2a1a0a';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(lx2,0);ctx.lineTo(lx2,ly);ctx.stroke();
    ctx.globalAlpha=flicker;ctx.fillStyle='#2a1a08';
    ctx.fillRect(lx2-7,ly,14,18);ctx.fillRect(lx2-5,ly-4,10,5);
    ctx.fillStyle='#ff9940';ctx.beginPath();ctx.arc(lx2,ly+9,4,0,PI2);ctx.fill();
  });
  ctx.restore();
  ctx.save();
  STARS.forEach((s,i)=>{
    const y=(s.x*.6+frame*s.spd*.25)%H;
    ctx.globalAlpha=s.br*.25;ctx.fillStyle='#ff9966';
    ctx.beginPath();ctx.arc(s.x,y,1,0,PI2);ctx.fill();
  });
  ctx.restore();
  ctx.globalAlpha=1;
}

function drawBgSakuya(){
  ctx.fillStyle='#060810';ctx.fillRect(0,0,W,H);
  ctx.save();
  for(let r=0;r<6;r++)for(let c=0;c<8;c++){
    ctx.fillStyle=(r+c)%2===0?'#0d1018':'#080c14';
    ctx.fillRect(c*60,H*.55+r*30,60,30);
  }
  ctx.restore();
  ctx.save();
  [W*.2,W*.5,W*.8].forEach((wx,i)=>{
    const wobble=Math.sin(rf*.01+i)*3;
    ctx.globalAlpha=.06;
    const wg=ctx.createLinearGradient(wx+wobble,0,wx+wobble,H*.6);
    wg.addColorStop(0,'#aaccff');wg.addColorStop(1,'transparent');
    ctx.fillStyle=wg;ctx.fillRect(wx-16+wobble,0,32,H*.6);
    ctx.globalAlpha=.2;ctx.strokeStyle='#1a2a3a';ctx.lineWidth=1.5;
    ctx.strokeRect(wx-16,10,32,H*.4);
    ctx.beginPath();ctx.moveTo(wx,10);ctx.lineTo(wx,H*.4+10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(wx-16,H*.2+10);ctx.lineTo(wx+16,H*.2+10);ctx.stroke();
  });
  ctx.restore();
  ctx.save();
  [[W*.1,H*.2,28],[W*.9,H*.25,22],[W*.15,H*.55,18]].forEach(([cx,cy,cr])=>{
    ctx.globalAlpha=.15;ctx.strokeStyle='#aaccff';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(cx,cy,cr,0,PI2);ctx.stroke();
    const h1=Math.sin(cx)*.5,h2=Math.cos(cy)*.8;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(h1)*cr*.6,cy+Math.sin(h1)*cr*.6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(h2)*cr*.85,cy+Math.sin(h2)*cr*.85);ctx.stroke();
    for(let t=0;t<12;t++){const ta=t/12*PI2;ctx.beginPath();ctx.moveTo(cx+Math.cos(ta)*cr*.88,cy+Math.sin(ta)*cr*.88);ctx.lineTo(cx+Math.cos(ta)*cr,cy+Math.sin(ta)*cr);ctx.stroke();}
  });
  ctx.restore();
  ctx.save();ctx.fillStyle='#0d1020';ctx.fillRect(0,H*.5,W,8);
  ctx.fillStyle='#0a0c18';ctx.fillRect(0,H*.5+8,W,H*.5);
  ctx.restore();
  ctx.save();
  STARS.forEach((s,i)=>{
    const y=(s.x+frame*s.spd*.5)%H;
    ctx.globalAlpha=s.br*.35;ctx.fillStyle='#aaccff';
    ctx.fillRect(s.x,y,1,1);
  });
  ctx.restore();
  ctx.globalAlpha=1;
}

function getBgType(){
  if(cirnoMode){
    const stage=CIRNO_STAGES[cirnoStageIdx]||'remilia';
    if(stage==='meiling')return 'meiling';
    if(stage==='patchouli')return 'patchouli';
    if(stage==='sakuya')return 'sakuya';
    if(stage==='final')return 'cellar';
    return 'remilia';
  }
  if(flandreActive||bossType==='flandre')return 'flandre';
  return bossType||'remilia';
}

function drawBg(){
  const bg=getBgType();
  if(bg==='meiling')drawBgMeiling();
  else if(bg==='patchouli')drawBgPatchouli();
  else if(bg==='sakuya')drawBgSakuya();
  else if(bg==='flandre')drawBgFlandre();
  else if(bg==='cellar')drawBgCellar();
  else drawBgRemilia();

  if(tsActive){ctx.fillStyle='#001133aa';ctx.fillRect(0,0,W,H);}
  else if(spellActive&&gstate==='playing'){
    const si=bossType==='flandre'?flandrePhase:Math.floor(phase/2);
    const sp=(dualActive?DUAL_SPELLS[dualSpellIdx%DUAL_SPELLS.length]:SPELLS[bossType]?.[si]);
    const col=sp?.col||'#cc0033';
    ctx.fillStyle=col+'18';ctx.fillRect(0,0,W,H);
    drawMagicCircle(bossX,bossY,110,col);
    ctx.globalAlpha=.22;drawMagicCircle(W/2,H/2,220,col);ctx.globalAlpha=1;
  }else if(bombVisT>0&&!sparkBeam){
    const ba=Math.min(1,bombVisT/20)*Math.min(1,bombTimer>0?1:bombVisT/30);
    ctx.fillStyle=`rgba(255,30,60,${ba*.06})`;ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=ba;drawReimuCircle(P.x,P.y,100);drawReimuCircle(W/2,H/3,180);ctx.globalAlpha=1;
  }
}

function drawMagicCircle(x,y,radius,col){
  ctx.save();ctx.translate(x,y);
  const v=bossType,al=.18;
  if(v==='remilia'||v==='flandre'){
    const c2=v==='flandre'?'#ff88ff':col;
    ctx.save();ctx.rotate(rf*.008);ctx.strokeStyle=c2;ctx.lineWidth=1.2;ctx.globalAlpha=al;
    ctx.beginPath();ctx.arc(0,0,radius,0,PI2);ctx.stroke();
    for(let i=0;i<24;i++){const a=i/24*PI2;ctx.beginPath();ctx.moveTo(Math.cos(a)*radius*.92,Math.sin(a)*radius*.92);ctx.lineTo(Math.cos(a)*radius,Math.sin(a)*radius);ctx.stroke();}
    ctx.restore();
    ctx.save();ctx.rotate(-rf*.013);ctx.strokeStyle=c2;ctx.lineWidth=1;ctx.globalAlpha=al*.9;
    ctx.beginPath();ctx.arc(0,0,radius*.78,0,PI2);ctx.stroke();
    for(let i=0;i<6;i++){const a=i/6*PI2,b=a+PI2/3;ctx.beginPath();ctx.moveTo(Math.cos(a)*radius*.78,Math.sin(a)*radius*.78);ctx.lineTo(Math.cos(b)*radius*.78,Math.sin(b)*radius*.78);ctx.stroke();}
    ctx.restore();
    ctx.save();ctx.rotate(rf*.02);ctx.strokeStyle=v==='flandre'?'#ffaaff':'#ff0000';ctx.lineWidth=.8;ctx.globalAlpha=al*.8;
    ctx.beginPath();ctx.arc(0,0,radius*.55,0,PI2);ctx.stroke();
    for(let i=0;i<5;i++){const a=i/5*PI2-Math.PI/2,b=(i+2)/5*PI2-Math.PI/2;ctx.beginPath();ctx.moveTo(Math.cos(a)*radius*.55,Math.sin(a)*radius*.55);ctx.lineTo(Math.cos(b)*radius*.55,Math.sin(b)*radius*.55);ctx.stroke();}
    ctx.restore();
  }else if(v==='sakuya'){
    ctx.save();ctx.rotate(rf*.005);ctx.strokeStyle=col;ctx.lineWidth=1.2;ctx.globalAlpha=al;
    ctx.beginPath();ctx.arc(0,0,radius,0,PI2);ctx.stroke();
    for(let i=0;i<60;i++){const a=i/60*PI2,len=i%5?0.05:0.1;ctx.beginPath();ctx.moveTo(Math.cos(a)*radius*(1-len),Math.sin(a)*radius*(1-len));ctx.lineTo(Math.cos(a)*radius,Math.sin(a)*radius);ctx.stroke();}
    ctx.restore();
    const hr=rf/600*PI2,mn=rf/50*PI2;
    ctx.save();ctx.strokeStyle='#ffffff';ctx.lineWidth=2;ctx.globalAlpha=al*1.5;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(hr-Math.PI/2)*radius*.4,Math.sin(hr-Math.PI/2)*radius*.4);ctx.stroke();
    ctx.strokeStyle='#aaddff';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(mn-Math.PI/2)*radius*.65,Math.sin(mn-Math.PI/2)*radius*.65);ctx.stroke();
    ctx.restore();
  }else if(v==='patchouli'){
    ctx.save();ctx.rotate(rf*.01);ctx.strokeStyle=col;ctx.lineWidth=1;ctx.globalAlpha=al;
    ctx.beginPath();ctx.arc(0,0,radius,0,PI2);ctx.stroke();
    for(let i=0;i<7;i++){const a=i/7*PI2;ctx.beginPath();ctx.arc(Math.cos(a)*radius*.88,Math.sin(a)*radius*.88,5,0,PI2);ctx.stroke();}
    ctx.restore();
    ctx.save();ctx.rotate(-rf*.015);ctx.strokeStyle='#ddaa44';ctx.lineWidth=.9;ctx.globalAlpha=al*.85;
    ctx.beginPath();for(let i=0;i<5;i++){const a=i/5*PI2-Math.PI/2,b=(i+2)/5*PI2-Math.PI/2;ctx.moveTo(Math.cos(a)*radius*.65,Math.sin(a)*radius*.65);ctx.lineTo(Math.cos(b)*radius*.65,Math.sin(b)*radius*.65);}ctx.stroke();
    ctx.restore();
  }else if(v==='meiling'){
    for(let r2=0;r2<4;r2++){
      const hue=(r2*60+rf*.5)%360;
      ctx.save();ctx.rotate(rf*(.008+r2*.004)*(r2%2?-1:1));ctx.strokeStyle=`hsl(${hue},90%,60%)`;ctx.lineWidth=1;ctx.globalAlpha=al;
      ctx.beginPath();ctx.arc(0,0,radius*(.5+r2*.17),0,PI2);ctx.stroke();ctx.restore();
    }
  }else{
    ctx.save();ctx.rotate(rf*.01);
    ctx.strokeStyle=(v==='reimu'?'#ff4466':'#ffdd44');ctx.lineWidth=1;ctx.globalAlpha=al;
    ctx.beginPath();ctx.arc(0,0,radius,0,PI2);ctx.stroke();
    for(let i=0;i<8;i++){const a=i/8*PI2;ctx.beginPath();ctx.moveTo(Math.cos(a)*radius*.9,Math.sin(a)*radius*.9);ctx.lineTo(Math.cos(a)*radius,Math.sin(a)*radius);ctx.stroke();}
    ctx.restore();
  }
  ctx.restore();
}

function drawReimuCircle(x,y,radius){
  ctx.save();ctx.translate(x,y);
  const p=.15+.08*Math.sin(rf*.06);
  ctx.save();ctx.rotate(rf*.012);ctx.strokeStyle='#ff2244';ctx.lineWidth=1.5;ctx.globalAlpha=p*1.3;
  ctx.beginPath();ctx.arc(0,0,radius,0,PI2);ctx.stroke();
  for(let i=0;i<8;i++){const a=i/8*PI2,ox=Math.cos(a)*radius,oy=Math.sin(a)*radius;ctx.save();ctx.translate(ox,oy);ctx.rotate(a+Math.PI/2);ctx.strokeStyle='#ffffff';ctx.lineWidth=.8;ctx.strokeRect(-4,-7,8,14);ctx.restore();}
  ctx.restore();
  ctx.save();ctx.rotate(-rf*.018);ctx.strokeStyle='#ffdd44';ctx.lineWidth=1.2;ctx.globalAlpha=p*1.1;
  ctx.beginPath();ctx.arc(0,0,radius*.75,0,PI2);ctx.stroke();ctx.restore();
  ctx.save();ctx.rotate(rf*.028);ctx.strokeStyle='#ffffff';ctx.lineWidth=.9;ctx.globalAlpha=p;
  ctx.beginPath();ctx.arc(0,0,radius*.5,0,PI2);ctx.stroke();ctx.restore();
  ctx.restore();
}

  ctx.beginPath();ctx.moveTo(x-12,y-34);ctx.lineTo(x-14,y-22);ctx.moveTo(x+12,y-34);ctx.lineTo(x+14,y-22);ctx.stroke();
  ctx.strokeStyle='#cc0033';ctx.lineWidth=1.5;ctx.beginPath();ctx.ellipse(x,y-36,16,6,0,0,PI2);ctx.stroke();ctx.beginPath();ctx.arc(x,y-42,10,Math.PI,PI2);ctx.stroke();
  ctx.strokeStyle='#ff8800';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(x+12,y);ctx.lineTo(x+28,y-20);ctx.stroke();

function drawFlanClone(x,y,col){
  // mini Flandre silhouette in clone color
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=1.2;
  // wings (smaller)
  for(let w=-1;w<=1;w+=2){
    for(let c=0;c<5;c++){
      const a=(-.25+c*.12)*w,r=14+c*7,hue=(c*60+rf*3)%360;
      const bx2=x+Math.cos(a)*w*r,by2=y+Math.sin(a)*r*.5;
      ctx.strokeStyle=`hsl(${hue},100%,65%)`;
      ctx.beginPath();ctx.moveTo(x+w*8,y);ctx.lineTo(bx2,by2);ctx.stroke();
    }
  }
  ctx.strokeStyle=col;ctx.lineWidth=1.2;
  ctx.beginPath();ctx.rect(x-7,y-9,14,16);ctx.stroke();
  ctx.beginPath();ctx.arc(x,y-18,7,0,PI2);ctx.stroke();
  ctx.beginPath();ctx.ellipse(x,y-28,10,4,0,0,PI2);ctx.stroke();
  ctx.beginPath();ctx.arc(x,y-32,7,Math.PI,PI2);ctx.stroke();
  // halo
  ctx.globalAlpha=.5+.3*Math.sin(rf*.12);
  ctx.strokeStyle=col;ctx.lineWidth=.8;
  ctx.beginPath();ctx.arc(x,y,22,0,PI2);ctx.stroke();
  ctx.restore();
}

function drawFlanClonesAndLasers(){
  if(!flanSplitMode||!flanClones.length)return;
  // draw lasers behind clones
  flanLasers.forEach((lz,i)=>{
    if(lz.state==='idle'||lz.width<=0)return;
    const fc=flanClones[i];
    ctx.save();
    if(lz.state==='telegraph'){
      // thin pulsing warning line
      ctx.globalAlpha=.4+.3*Math.sin(rf*.3);
      ctx.strokeStyle=fc.col;ctx.lineWidth=1.5;ctx.setLineDash([6,6]);
      ctx.beginPath();ctx.moveTo(lz.snapX,fc.y);ctx.lineTo(lz.snapX,H+10);ctx.stroke();
      ctx.setLineDash([]);
      // X marker at top of beam
      ctx.globalAlpha=.7;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(lz.snapX-8,fc.y+10);ctx.lineTo(lz.snapX+8,fc.y+26);ctx.stroke();
      ctx.beginPath();ctx.moveTo(lz.snapX+8,fc.y+10);ctx.lineTo(lz.snapX-8,fc.y+26);ctx.stroke();
    } else if(lz.state==='fire'){
      // full beam
      const hw=lz.width/2;
      ctx.globalAlpha=.55;
      const lg=ctx.createLinearGradient(lz.snapX-hw,0,lz.snapX+hw,0);
      lg.addColorStop(0,'transparent');
      lg.addColorStop(.3,fc.col);
      lg.addColorStop(.5,'#ffffff');
      lg.addColorStop(.7,fc.col);
      lg.addColorStop(1,'transparent');
      ctx.fillStyle=lg;
      ctx.fillRect(lz.snapX-hw,fc.y,lz.width,H-fc.y+20);
      // bright core line
      ctx.globalAlpha=.9;
      ctx.strokeStyle='#ffffff';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(lz.snapX,fc.y);ctx.lineTo(lz.snapX,H+10);ctx.stroke();
    }
    ctx.restore();
  });
  // draw clone sprites
  flanClones.forEach((fc,i)=>{
    ctx.globalAlpha=flanSplitT>0?(1-flanSplitT/60):.9+.1*Math.sin(rf*.08+i);
    drawFlanClone(fc.x,fc.y,fc.col);
  });
  ctx.globalAlpha=1;
}

function drawScreenCrack(){
  if(crackT<=0)return;
  const alpha=Math.min(1,crackT/30)*Math.min(1,(crackT)/180*2);
  ctx.save();
  ctx.globalAlpha=alpha*.85;
  ctx.strokeStyle='#ffffff';ctx.lineWidth=2;
  crackLines.forEach(l=>{
    ctx.beginPath();ctx.moveTo(l.x1,l.y1);ctx.lineTo(l.x2,l.y2);ctx.stroke();
  });
  ctx.globalAlpha=alpha*.25;
  ctx.strokeStyle='#aaddff';ctx.lineWidth=4;
  crackLines.slice(0,8).forEach(l=>{
    ctx.beginPath();ctx.moveTo(l.x1,l.y1);ctx.lineTo(l.x2,l.y2);ctx.stroke();
  });
  // vignette flash at crack start
  if(crackT>190){
    ctx.globalAlpha=(crackT-190)/30*.6;
    ctx.fillStyle='#ffffff';ctx.fillRect(0,0,W,H);
  }
  ctx.restore();
}

function drawCirnoPlayer(){
  const x=P.x,y=P.y;
  ctx.globalAlpha=invT>0?(Math.sin(rf*.3)*.5+.5):1;

  if(shieldActive&&cirnoShield>0){
    const pulse=.7+.3*Math.sin(rf*.12);
    for(let bl=0;bl<cirnoShield;bl++){
      const rad=32+bl*6;
      ctx.save();
      ctx.translate(x,y);
      ctx.strokeStyle=`rgba(${136+bl*30},${220+bl*15},255,${pulse*(0.9-bl*.2)})`;
      ctx.lineWidth=1.5;
      ctx.beginPath();
      for(let s=0;s<6;s++){
        const a=s/6*PI2+rf*.015;
        if(s===0)ctx.moveTo(Math.cos(a)*rad,Math.sin(a)*rad);
        else ctx.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
      }
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }
    ctx.save();
    ctx.translate(x,y);
    ctx.strokeStyle=`rgba(200,240,255,${pulse*.4})`;
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(0,0,26,0,PI2);
    ctx.stroke();
    ctx.restore();
  }

  if(!shieldActive&&cirnoShield===0&&rf%30<15){
    ctx.save();
    ctx.translate(x,y);
    ctx.strokeStyle='#ff444488';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(0,0,26,0,PI2);
    ctx.stroke();
    ctx.restore();
  }

  ctx.strokeStyle='#88eeff';ctx.lineWidth=1;
  for(let w=-1;w<=1;w+=2){
    for(let i=0;i<3;i++){
      const a=(.2+i*.25)*w,r=18+i*8;
      ctx.save();ctx.translate(x+w*8,y);ctx.rotate(a);ctx.strokeStyle=`rgba(${136+i*30},${220+i*10},255,${.6-i*.15})`;
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-r);ctx.lineTo(w*6,-r+4);ctx.lineTo(0,-r+8);ctx.stroke();
      ctx.restore();
    }
  }
  ctx.strokeStyle='#44ccff';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x-9,y+2);ctx.lineTo(x-11,y+18);ctx.lineTo(x+11,y+18);ctx.lineTo(x+9,y+2);ctx.closePath();ctx.stroke();
  ctx.strokeStyle='#aaeeff';ctx.lineWidth=1.5;ctx.beginPath();ctx.rect(x-8,y-12,16,16);ctx.stroke();
  ctx.strokeStyle='#ffeecc';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x,y-20,9,0,PI2);ctx.stroke();
  ctx.strokeStyle='#44aaff';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(x,y-29,11,Math.PI,PI2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-11,y-29);ctx.lineTo(x-12,y-20);ctx.moveTo(x+11,y-29);ctx.lineTo(x+12,y-20);ctx.stroke();
  ctx.strokeStyle='#aaeeff';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x-6,y-30);ctx.lineTo(x-10,y-35);ctx.lineTo(x-4,y-32);ctx.lineTo(x,y-36);ctx.lineTo(x+4,y-32);ctx.lineTo(x+10,y-35);ctx.lineTo(x+6,y-30);ctx.stroke();
  // ── HITBOX INDICATOR: show actual 10px hitbox dot ──
  ctx.strokeStyle='#44ccff44';ctx.lineWidth=1;ctx.beginPath();ctx.arc(x,y,10,0,PI2);ctx.stroke();
  ctx.strokeStyle='#44ccff';ctx.lineWidth=1;ctx.beginPath();ctx.arc(x,y,3,0,PI2);ctx.stroke();
  ctx.globalAlpha=1;
}

function drawDaiyousei(){
  if(!daiActive)return;
  const x=daiX,y=daiY;
  ctx.save();ctx.globalAlpha=Math.min(1,daiTimer/20);

  const flapSpd=daiMode==='attack'?.18:.08;

    ctx.save();ctx.translate(x+w*6,y);ctx.rotate(w*.3+Math.sin(rf*flapSpd)*.2);
    ctx.strokeStyle=daiMode==='attack'?'#44ff88':'#88ffaa';

    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(w*20,-15);ctx.lineTo(w*14,-5);ctx.closePath();ctx.stroke();
    ctx.restore();
  }
  ctx.strokeStyle=daiMode==='attack'?'#44ff88':'#44cc66';ctx.lineWidth=1.2;ctx.beginPath();ctx.rect(x-5,y-8,10,12);ctx.stroke();
  ctx.strokeStyle='#ffeecc';ctx.lineWidth=1;ctx.beginPath();ctx.arc(x,y-14,7,0,PI2);ctx.stroke();
  ctx.strokeStyle=daiMode==='attack'?'#44ff88':'#44cc44';ctx.lineWidth=1;ctx.beginPath();ctx.arc(x,y-20,8,Math.PI,PI2);ctx.stroke();

  if(daiMode==='attack'){
    ctx.strokeStyle='#44ff8866';ctx.lineWidth=4;
    ctx.beginPath();ctx.arc(x,y,22+Math.sin(rf*.15)*4,0,PI2);ctx.stroke();
    ctx.strokeStyle='#88ffaa';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(x+daiDir*10,y+3);ctx.lineTo(x+daiDir*18,y+3);
    ctx.moveTo(x+daiDir*18,y+3);ctx.lineTo(x+daiDir*14,y);

    ctx.stroke();
  } else {
    ctx.strokeStyle='#88ffaa44';ctx.lineWidth=3;ctx.beginPath();ctx.arc(x,y,20+Math.sin(rf*.1)*5,0,PI2);ctx.stroke();
  }
  ctx.restore();

  daiKunais.forEach(k=>{
    ctx.save();
    ctx.globalAlpha=Math.min(1,k.life/15);
    ctx.translate(k.x,k.y);
    ctx.rotate(Math.atan2(k.vy,k.vx)+Math.PI/2);
    ctx.strokeStyle='#44ff88';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,-7);ctx.lineTo(2,0);ctx.lineTo(0,4);ctx.lineTo(-2,0);ctx.closePath();ctx.stroke();
    ctx.strokeStyle='#aaffcc';ctx.lineWidth=.7;
    ctx.beginPath();ctx.moveTo(0,-5);ctx.lineTo(1,0);ctx.lineTo(0,3);ctx.lineTo(-1,0);ctx.closePath();ctx.stroke();
    ctx.restore();
  });
}

function drawDualBoss(){
  if(!dualActive)return;
  const sp=DUAL_SPELLS[dualSpellIdx%DUAL_SPELLS.length];
  const inactiveWho=sp.who==='reimu'?'marisa':'reimu';
  ctx.save();ctx.globalAlpha=.25;
  const ghostX=bossType==='reimu'?bossX+100:bossX-100;
  const savedBX=bossX,savedBY=bossY;
  bossX=ghostX;bossY=bossY+15;
  if(inactiveWho==='reimu')drawReimulaBoss();
  else drawMarisaBoss();
  bossX=savedBX;bossY=savedBY;
  ctx.restore();
  if(bossType==='reimu')drawReimulaBoss();
  else drawMarisaBoss();
}
