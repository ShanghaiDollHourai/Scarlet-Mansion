function drawBullets(){
  for(let i=0;i<bullets.length;i++){
    const b=bullets[i];if(!b.active)continue;
    ctx.save();
    if(b.frozen){
      ctx.globalAlpha=.7;
      ctx.strokeStyle='#aaeeff';ctx.lineWidth=2;ctx.setLineDash([2,2]);
      ctx.beginPath();ctx.arc(b.x,b.y,(b.r||4)+2,0,PI2);ctx.stroke();
      ctx.setLineDash([]);
      ctx.lineWidth=1;ctx.strokeStyle='#88ddff88';
      for(let s=0;s<4;s++){const a=s*Math.PI/2;ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x+Math.cos(a)*8,b.y+Math.sin(a)*8);ctx.stroke();}
      ctx.restore();continue;
    }
    if(b.shape==='knife'){
      ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.ang+Math.PI/2);
      ctx.strokeStyle=b.col;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(2,0);ctx.lineTo(0,4);ctx.lineTo(-2,0);ctx.closePath();ctx.stroke();
      ctx.restore();
    }else if(b.shape==='spear'){
      // Gungnir — longer than knife, tapered lance with crossguard, scarlet/gold
      ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.ang+Math.PI/2);
      // glow when homing
      if(b.homingFrames>0){
        ctx.globalAlpha=.25+.15*Math.sin(rf*.25);
        ctx.strokeStyle='#ff4466';ctx.lineWidth=6;
        ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(0,8);ctx.stroke();
        ctx.globalAlpha=1;
      }
      // shaft
      ctx.strokeStyle=b.col==='#ff8822'?'#ff6600':'#cc0033';
      ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(0,7);ctx.stroke();
      // tip — pointed head
      ctx.strokeStyle='#ffeeaa';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(3,-10);ctx.lineTo(0,-6);ctx.lineTo(-3,-10);ctx.closePath();ctx.stroke();
      // crossguard
      ctx.strokeStyle='#ffdd66';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(-5,-2);ctx.lineTo(5,-2);ctx.stroke();
      // butt cap
      ctx.strokeStyle=b.col==='#ff8822'?'#ff8833':'#880011';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(-1,5);ctx.lineTo(1,5);ctx.lineTo(0,9);ctx.closePath();ctx.stroke();
      ctx.restore();
    }else{
      ctx.strokeStyle=b.col;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,PI2);ctx.stroke();
      ctx.beginPath();ctx.arc(b.x,b.y,b.r*.4,0,PI2);ctx.stroke();
    }
    ctx.globalAlpha=1;ctx.restore();
  }
  if(tsActive)pendingK.forEach(k=>{ctx.save();ctx.translate(k.x,k.y);ctx.rotate(k.ang+Math.PI/2);ctx.strokeStyle='#aaccffaa';ctx.lineWidth=1;ctx.setLineDash([2,2]);ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(2,0);ctx.lineTo(0,4);ctx.lineTo(-2,0);ctx.closePath();ctx.stroke();ctx.setLineDash([]);ctx.restore();});
}

function drawPshots(){
  pshots.forEach(p=>{
    if(cirnoMode){
      ctx.strokeStyle='#88ddff';ctx.lineWidth=1.5;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(Math.atan2(p.vy||0,p.sx||0));
      ctx.beginPath();ctx.moveTo(0,-5);ctx.lineTo(2,0);ctx.lineTo(0,3);ctx.lineTo(-2,0);ctx.closePath();ctx.stroke();
      ctx.strokeStyle='#ccf0ff88';ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,0,3,0,PI2);ctx.stroke();
      ctx.restore();
    } else if(p.marisa){ctx.strokeStyle='#ffee44';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+p.sx*3,p.y+10);ctx.stroke();}
    else{ctx.strokeStyle='#ff8888';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(p.x,p.y,3,0,PI2);ctx.stroke();}
  });
}

function drawMasterSpark(){
  if(!sparkBeam)return;
  const bx=sparkBeam.x,bw=sparkBeam.w,bh=P.y;
  ctx.save();
  const g=ctx.createLinearGradient(bx-bw,0,bx+bw,0);
  g.addColorStop(0,'rgba(255,220,0,0)');g.addColorStop(.5,'rgba(255,255,200,.5)');g.addColorStop(1,'rgba(255,220,0,0)');
  ctx.fillStyle=g;ctx.fillRect(bx-bw,0,bw*2,bh);
  const cg=ctx.createLinearGradient(bx-bw*.25,0,bx+bw*.25,0);
  cg.addColorStop(0,'rgba(255,255,200,0)');cg.addColorStop(.5,'rgba(255,255,255,.9)');cg.addColorStop(1,'rgba(255,255,200,0)');
  ctx.fillStyle=cg;ctx.fillRect(bx-bw*.25,0,bw*.5,bh);
  ctx.restore();
}

function drawWarning(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  const pulse=Math.sin(rf*.15);
  if(warningTimer%20<10){
    ctx.fillStyle=`rgba(180,0,0,${.3+.2*Math.abs(pulse)})`;ctx.fillRect(0,0,W,H);
    ctx.font='bold 64px Cinzel';ctx.textAlign='center';
    ctx.strokeStyle='#000';ctx.lineWidth=6;ctx.strokeText('WARNING',W/2,H/2-20);
    ctx.fillStyle=`rgb(255,${50+100*Math.abs(pulse)},50)`;ctx.fillText('WARNING',W/2,H/2-20);
    ctx.font='14px Cinzel';ctx.fillStyle='#ffaaaa';ctx.fillText('A DANGEROUS PRESENCE APPROACHES',W/2,H/2+30);
    ctx.font='11px Cinzel';ctx.fillStyle='#ff666688';ctx.fillText('— FLANDRE SCARLET —',W/2,H/2+55);
  }
}

// ── HUD ────────────────────────────────────────────────────────────────────
function drawHUD(){
  if(gstate!=='playing'&&gstate!=='dialogue')return;

  let sp,hpCol;
  if(dualActive){
    sp=DUAL_SPELLS[dualSpellIdx%DUAL_SPELLS.length];
    hpCol=sp.col;
  } else {
    const si=bossType==='flandre'?flandrePhase:Math.floor(phase/2);
    sp=SPELLS[bossType]?.[si]||SPELLS[bossType]?.[0];
    hpCol=spellActive?(sp?.col||'#ff4466'):(bossType==='sakuya'?'#aaccff':bossType==='patchouli'?'#9966cc':bossType==='meiling'?'#44cc66':bossType==='flandre'?'#ff88ff':'#ff4466');
  }
  const barW=W-40,bx=20,by=H-30;
  ctx.strokeStyle='#ffffff22';ctx.lineWidth=1;ctx.strokeRect(bx,by,barW,8);
  ctx.fillStyle=hpCol+'88';ctx.fillRect(bx,by,barW*phaseHP/phaseMaxHP,8);
  ctx.strokeStyle=hpCol;ctx.strokeRect(bx,by,barW*phaseHP/phaseMaxHP,8);

  const dots=bossType==='flandre'?4:dualActive?DUAL_SPELLS.length:cirnoMode?2:7;
  for(let i=0;i<dots;i++){
    ctx.strokeStyle=i<=(dualActive?dualSpellIdx:bossType==='flandre'?flandrePhase:phase)?hpCol:'#333';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(bx+barW/2-dots*5+i*10,by-8,3,0,PI2);ctx.stroke();
  }

  if(tsActive){ctx.fillStyle='#aaccff';ctx.font='bold 13px Cinzel';ctx.textAlign='center';ctx.fillText('-- THE WORLD --',W/2,50);}
  if(bossType==='flandre'){ctx.textAlign='center';ctx.fillStyle='#ff88ff';ctx.font='bold 12px Cinzel';ctx.fillText('⚠ FLANDRE SCARLET ⚠',W/2,50);}

  if(cirnoMode){
    ctx.fillStyle='#44ccff';ctx.font='bold 11px Cinzel';ctx.textAlign='left';
    const stageName=dualActive?'FINAL STAGE':CIRNO_STAGES[cirnoStageIdx].toUpperCase();
    ctx.fillText('⑨ '+stageName,20,20);
    ctx.fillStyle='#aaeeff';ctx.font='11px Cinzel';
    ctx.fillText('SCORE: '+score.toString().padStart(8,'0'),20,34);
    ctx.fillText('GRAZE: '+graze,20,46);
    ctx.textAlign='right';ctx.fillStyle='#ffffff';
    ctx.fillText('HI: '+hiScore.toString().padStart(8,'0'),W-20,20);

    if(dualActive){
      ctx.textAlign='center';ctx.fillStyle=sp.col;ctx.font='bold 11px Cinzel';
      ctx.fillText((sp.who==='reimu'?'◈ REIMU':'◈ MARISA')+' ACTIVE',W/2,60);
    }

    const shX=20,shY=H-95;
    ctx.fillStyle='#aaeeff';ctx.font='bold 10px Cinzel';ctx.textAlign='left';
    ctx.fillText('SHIELD',shX,shY-4);
    for(let i=0;i<SHIELD_MAX;i++){
      const bx2=shX+i*26,by2=shY;
      if(i<cirnoShield){
        ctx.strokeStyle='#44ccff';ctx.lineWidth=1.5;ctx.fillStyle='#44ccff22';
        ctx.beginPath();
        for(let s=0;s<6;s++){
          const a=s/6*PI2;
          if(s===0)ctx.moveTo(bx2+10+Math.cos(a)*10,by2+10+Math.sin(a)*10);
          else ctx.lineTo(bx2+10+Math.cos(a)*10,by2+10+Math.sin(a)*10);
        }
        ctx.closePath();ctx.fill();ctx.stroke();
        if(shieldActive&&rf%20<10){
          ctx.strokeStyle='#aaeeff';ctx.lineWidth=2;ctx.globalAlpha=.7;
          ctx.beginPath();
          for(let s=0;s<6;s++){
            const a=s/6*PI2+rf*.02;
            if(s===0)ctx.moveTo(bx2+10+Math.cos(a)*10,by2+10+Math.sin(a)*10);
            else ctx.lineTo(bx2+10+Math.cos(a)*10,by2+10+Math.sin(a)*10);
          }
          ctx.closePath();ctx.stroke();ctx.globalAlpha=1;
        }
      } else {
        ctx.strokeStyle='#224455';ctx.lineWidth=1;ctx.fillStyle='#00000044';
        ctx.beginPath();
        for(let s=0;s<6;s++){
          const a=s/6*PI2;
          if(s===0)ctx.moveTo(bx2+10+Math.cos(a)*10,by2+10+Math.sin(a)*10);
          else ctx.lineTo(bx2+10+Math.cos(a)*10,by2+10+Math.sin(a)*10);
        }
        ctx.closePath();ctx.fill();ctx.stroke();
        ctx.strokeStyle='#ff444466';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(bx2+4,by2+4);ctx.lineTo(bx2+16,by2+16);
        ctx.moveTo(bx2+16,by2+4);ctx.lineTo(bx2+4,by2+16);ctx.stroke();
      }
    }
    ctx.fillStyle=cirnoShield===0?(rf%20<10?'#ff4444':'#882222'):(shieldActive?'#44ccff':'#557788');
    ctx.font='bold 9px Cinzel';ctx.textAlign='left';
    ctx.fillText(cirnoShield===0?'BROKEN':(shieldActive?'ACTIVE':'SHIFT=SHIELD'),shX+SHIELD_MAX*26+6,shY+12);

    if(cirnoShield<SHIELD_MAX){
      const dgX=W-150,dgY=H-95,dgW=130,dgH=8;
      const dgFrac=shieldGraze/DAI_GRAZE_PER_BLOCK;
      ctx.strokeStyle='#224433';ctx.lineWidth=1;ctx.strokeRect(dgX,dgY,dgW,dgH);
      ctx.fillStyle='#44cc66';ctx.fillRect(dgX,dgY,dgW*dgFrac,dgH);
      ctx.strokeStyle='#88ffaa';ctx.strokeRect(dgX,dgY,dgW*dgFrac,dgH);
      ctx.fillStyle='#88ffaa';ctx.font='bold 9px Cinzel';ctx.textAlign='right';
      ctx.fillText(daiActive&&daiMode==='heal'?'DAI INCOMING!':'HEAL '+(shieldGraze)+'/'+DAI_GRAZE_PER_BLOCK+' → DAI',W-20,dgY-3);
    }

    {
      const agX=W-150,agY=cirnoShield<SHIELD_MAX?H-82:H-95,agW=130,agH=7;
      const agFrac=daiAttackGraze/DAI_ATTACK_GRAZE;
      ctx.strokeStyle='#113322';ctx.lineWidth=1;ctx.strokeRect(agX,agY,agW,agH);
      const agCol=daiActive&&daiMode==='attack'?'#00ff88':'#44ff88';
      ctx.fillStyle=agCol+'88';ctx.fillRect(agX,agY,agW*agFrac,agH);
      ctx.strokeStyle=agCol;ctx.strokeRect(agX,agY,agW*agFrac,agH);
      ctx.fillStyle=agCol;ctx.font='bold 9px Cinzel';ctx.textAlign='right';
      ctx.fillText(daiActive&&daiMode==='attack'?'✦ DAI ATTACKING!':'✦ DAI '+(daiAttackGraze)+'/'+DAI_ATTACK_GRAZE,W-20,agY-3);
    }

    if(cirnoShield===0&&rf%20<10){
      ctx.fillStyle='#ff4444';ctx.font='bold 10px Cinzel';ctx.textAlign='left';
      ctx.fillText('⚠ NO SHIELD — ONE HIT KILLS',shX,shY+28);
    }

    const fgX=20,fgY=H-70,fgW=120,fgH=8;
    ctx.strokeStyle='#224455';ctx.lineWidth=1;ctx.strokeRect(fgX,fgY,fgW,fgH);
    if(freezeActive){
      const fp=freezeTimer/FREEZE_DUR;
      ctx.fillStyle='#44ccff';ctx.fillRect(fgX,fgY,fgW*fp,fgH);
      ctx.strokeStyle='#88eeff';ctx.strokeRect(fgX,fgY,fgW*fp,fgH);
      ctx.fillStyle='#44ccff';ctx.font='bold 9px Cinzel';ctx.textAlign='left';
      if(rf%20<10)ctx.fillText('❄ FREEZE ACTIVE',fgX,fgY-3);
    } else if(freezeCooldown>0){
      const cp=1-freezeCooldown/FREEZE_CD;
      ctx.fillStyle='#336677';ctx.fillRect(fgX,fgY,fgW*cp,fgH);
      ctx.strokeStyle='#447788';ctx.strokeRect(fgX,fgY,fgW*cp,fgH);
      ctx.fillStyle='#336677';ctx.font='9px Cinzel';ctx.textAlign='left';ctx.fillText('❄ COOLDOWN',fgX,fgY-3);
    } else {
      ctx.fillStyle='#44ccff44';ctx.fillRect(fgX,fgY,fgW,fgH);
      ctx.strokeStyle='#44ccff';ctx.strokeRect(fgX,fgY,fgW,fgH);
      ctx.fillStyle='#44ccff';ctx.font='bold 9px Cinzel';ctx.textAlign='left';ctx.fillText('❄ FREEZE READY',fgX,fgY-3);
    }

    if(freezePerfect&&spellActive){
      ctx.fillStyle='#aaeeff66';ctx.font='8px Cinzel';ctx.textAlign='left';ctx.fillText('❄ NO-FREEZE BONUS ACTIVE',fgX,fgY+fgH+10);
    }

    if(spellActive){
      const dsp=dualActive?DUAL_SPELLS[dualSpellIdx%DUAL_SPELLS.length]:sp;
      if(dsp){
        ctx.textAlign='right';ctx.fillStyle=(dsp.col||'#cc0033')+'cc';ctx.font='10px Noto Serif JP';ctx.fillText(dsp.jp,W-20,74);
        ctx.font='10px Cinzel';ctx.fillStyle='#ffffff88';ctx.fillText(dsp.en,W-20,86);
      }
    }

    if(invT>0&&invT<=60&&invT!==999){
      ctx.strokeStyle='#44ccff';ctx.lineWidth=1.5;ctx.globalAlpha=Math.min(1,invT/60)*.6;
      ctx.beginPath();ctx.arc(P.x,P.y,28+Math.sin(rf*.3)*4,0,PI2);ctx.stroke();ctx.globalAlpha=1;
    }
    if(freezeActive){
      const fp=freezeTimer/FREEZE_DUR;
      ctx.strokeStyle='#44ccff';ctx.lineWidth=2;ctx.globalAlpha=.5*fp;
      ctx.beginPath();ctx.arc(P.x,P.y,W*(.5-fp*.3),0,PI2);ctx.stroke();ctx.globalAlpha=1;
    }

  } else {
    ctx.fillStyle='#ffffff';ctx.font='11px Cinzel';ctx.textAlign='left';
    ctx.fillText('SCORE: '+score.toString().padStart(8,'0'),20,20);
    ctx.fillText('GRAZE: '+graze,20,34);
    ctx.textAlign='right';ctx.fillText('HI: '+hiScore.toString().padStart(8,'0'),W-20,20);

    ctx.textAlign='left';ctx.fillText('LIVES:',20,H-50);
    for(let i=0;i<4;i++){ctx.strokeStyle=i<lives?'#ff4466':'#333';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(72+i*18,H-55,5,0,PI2);ctx.stroke();if(i<lives){ctx.fillStyle='#ff446633';ctx.fill();}}
    ctx.fillText('BOMBS:',20,H-36);
    for(let i=0;i<5;i++){
      ctx.strokeStyle=i<bombs?'#ffd700':'#333';ctx.lineWidth=1.5;ctx.beginPath();
      for(let j=0;j<5;j++){const a=j*PI2/5-Math.PI/2;j===0?ctx.moveTo(78+i*16+Math.cos(a)*5,H-41+Math.sin(a)*5):ctx.lineTo(78+i*16+Math.cos(a)*5,H-41+Math.sin(a)*5);}
      ctx.closePath();ctx.stroke();
    }
    ctx.textAlign='right';ctx.fillStyle=difficulty===4?'#00ffaa':difficulty===3?'#ff4466':'#555';ctx.fillText(DIFF[difficulty].name,W-20,H-36);
    ctx.fillStyle=character==='marisa'?'#ffdd44':'#ff4466';ctx.font='bold 11px Cinzel';ctx.fillText(character==='marisa'?'MARISA':'REIMU',W-20,H-50);
    if(accessories.length>0){ctx.fillStyle='#ffdd44';ctx.font='10px Cinzel';ctx.textAlign='left';ctx.fillText((character==='marisa'?'✦ HAKKERO':'✦ ORB')+' x'+accessories.length,20,H-64);}

    if(spellActive&&sp){
      ctx.textAlign='right';ctx.fillStyle=(sp.col||'#cc0033')+'cc';ctx.font='10px Noto Serif JP';ctx.fillText(sp.jp,W-20,46);
      ctx.font='10px Cinzel';ctx.fillStyle='#ffffff88';ctx.fillText(sp.en,W-20,58);
    }
    if(bombVisT>0){
      const prog=1-bombVisT/(sparkBeam?90:120);
      ctx.strokeStyle=sparkBeam?'#ffdd44':'#ff4400';ctx.lineWidth=3;ctx.globalAlpha=.7*(1-prog);
      ctx.beginPath();ctx.arc(P.x,P.y,W*prog*.8,0,PI2);ctx.stroke();ctx.globalAlpha=1;
    }
    if(invT>0&&invT<=60){
      ctx.strokeStyle='#ffffff';ctx.lineWidth=1.5;ctx.globalAlpha=invT/60*.6;
      ctx.beginPath();ctx.arc(P.x,P.y,28+Math.sin(rf*.3)*4,0,PI2);ctx.stroke();ctx.globalAlpha=1;
    }
  }

  ctx.font='11px Cinzel';ctx.textAlign='left';ctx.globalAlpha=1;
}

function drawDlg(){
  if(gstate!=='dialogue')return;
  const line=dlgLines[dlgIdx],col=SPK_COL[line.s]||'#fff',name=SPK_NAME[line.s]||line.s;
  const boxY=H-140;
  ctx.save();
  ctx.fillStyle='#000000cc';ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.fillRect(10,boxY,W-20,120);ctx.strokeRect(10,boxY,W-20,120);
  ctx.fillStyle=col+'33';ctx.fillRect(10,boxY,120,22);ctx.strokeStyle=col;ctx.lineWidth=1;ctx.strokeRect(10,boxY,120,22);
  ctx.fillStyle=col;ctx.font='bold 12px Cinzel';ctx.textAlign='left';ctx.fillText(name,18,boxY+15);
  ctx.fillStyle='#ffffff';ctx.font='11px Cinzel';
  const txt=line.t.substring(0,dlgChars),words=txt.split(' ');
  let ls='',ly=boxY+38;
  words.forEach(w=>{const t=ls+(ls?' ':'')+w;if(ctx.measureText(t).width>W-48&&ls){ctx.fillText(ls,24,ly);ls=w;ly+=18;}else ls=t;});
  if(ls)ctx.fillText(ls,24,ly);
  if(dlgChars>=line.t.length){ctx.fillStyle=col;ctx.font='10px Cinzel';ctx.textAlign='right';if(rf%40<20)ctx.fillText('▶ G',W-18,boxY+112);}
  ctx.restore();
}

// ── END SCREEN ────────────────────────────────────────────────────────────
function canContinueRun(){
  return continueCount<1&&(gstate==='dead'||gstate==='moonout');
}
function continueRun(){
  if(!canContinueRun())return;
  usedContinue=true;continueCount++;
  score=0;graze=0;
  spellHit=false;spellBombed=false;freezePerfect=true;
  P.x=W/2;P.y=H-100;
  bullets.forEach(b=>b.active=false);
  bullets=[];pshots=[];pendingK=[];sballs=[];particles=[];fmsgs=[];
  bombActive=false;bombTimer=0;bombVisT=0;bombOrbs=[];sparkBeam=null;
  tsActive=false;tsTimer=0;tsFired=[false,false,false,false];
  invT=120;flashT=0;

  if(cirnoMode){
    lives=1;bombs=0;
    cirnoShield=SHIELD_MAX;shieldActive=false;shieldGraze=0;shieldWasUp=false;
    freezeActive=false;freezeTimer=0;freezeCooldown=0;
    daiActive=false;daiTimer=0;daiMode='heal';daiAttackGraze=0;daiKunais=[];
  } else if(sakuyaMode){
    lives=4;bombs=3;
    sakuyaTS=false;sakuyaTSBar=0;sakuyaTSCool=0;sakuyaTSKnives=[];
    moonGrace=0;moonWarning=false;moonPhase=Math.max(moonPhase,.35);
    const tsOv=document.getElementById('tsOverlay');if(tsOv)tsOv.style.opacity=0;
    startMusic('misty');
  } else {
    lives=4;bombs=3;
  }

  const ov=document.getElementById('overlay');
  ov.style.display='none';
  const pb=document.getElementById('pauseBtn');
  if(pb)pb.style.display='block';
  gstate='playing';
}
function showEnd(){
  if(sakuyaMode){skShowEnd(gstate==='win'?'win':gstate==='moonout'?'moonout':'dead');return;}
  if(score>hiScore)hiScore=score;
  const pb=document.getElementById('pauseBtn');
  if(pb)pb.style.display='none';
  const win=gstate==='win'||gstate==='truewin',tw=gstate==='truewin';
  const ov=document.getElementById('overlay');
  if(cirnoMode){
    const endTitle=tw?'⑨ STRONGEST!':win?'STAGE<br>CLEAR':'CIRNO<br>DOWN';
    const endCol=tw?'#44ccff':win?'#88ffaa':'#ff4466';
    const endMsg=tw?'Cirno defeated everyone in the SDM and froze the wine cellar.':(win?'Stage cleared! Onto the next!':'Even the strongest fairy falls sometimes...');
    const CIRNO_DIFF_NAMES=['EASY AS ICE','THE STRONGEST','ACTUALLY HARD','LUNATIC FAIRY'];
    ov.innerHTML=`
      <h1 style="color:${endCol};text-shadow:0 0 20px ${endCol}88">${endTitle}</h1>
      <div class="sub">${endMsg}</div>
      <div class="score-disp">SCORE: ${score.toString().padStart(8,'0')}</div>
      <div class="sub">GRAZE: ${graze} &nbsp;|&nbsp; HI: ${hiScore.toString().padStart(8,'0')}</div>
      <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;justify-content:center;">
        ${[0,1,2,3].map(i=>`<button class="diff-btn${i===difficulty?' active':''}" data-d="${i}" style="font-size:9px;padding:4px 8px">⑨ ${CIRNO_DIFF_NAMES[i]}</button>`).join('')}
      </div>
      <button id="startBtn" style="border-color:#cc0033;color:#cc0033;margin-top:4px">NORMAL MODE</button>
      <button id="cirnoBtn">⑨ PLAY AGAIN</button>
      ${(!win&&canContinueRun())?'<button id="continueBtn" class="pause-btn resume" style="width:auto;padding:8px 22px;margin-top:4px;border-color:#44ccff;color:#44ccff">↻ CONTINUE (SCORE RESET)</button>':''}`;
  } else {

      <div class="score-disp">SCORE: ${score.toString().padStart(8,'0')}</div>

      <div class="boss-select">

        <button class="boss-btn sakuya" data-boss="sakuya">SAKUYA<br><span style="font-size:10px;opacity:.6">PERFECT MAID</span></button>
        <button class="boss-btn patchouli" data-boss="patchouli">PATCHOULI<br><span style="font-size:10px;opacity:.6">GREAT LIBRARY</span></button>
        <button class="boss-btn meiling" data-boss="meiling">MEILING<br><span style="font-size:10px;opacity:.6">GATE GUARD</span></button>

  }
  ov.style.display='flex';

}

function skStartPhase(p){
  skPhase=p;phaseST=0;spiralA=0;crossA=0;
  phaseMaxHP=SK_BOSS_HP;phaseHP=SK_BOSS_HP;
  spellActive=(p%2===1);
  bullets.forEach(b=>b.active=false);bullets=[];
  spellHit=false;spellBombed=false;
  if(spellActive){
    const sp=SPELLS_SK_CIRNO[Math.floor(p/2)];
    if(sp){showSpellFlash(sp);SFX.spellcard();}
  }
}

function skPhaseDefeated(){
  if(spellActive&&!spellHit&&!spellBombed){
    score+=5000;lives=Math.min(4,lives+1);
    moonPhase=Math.min(1,moonPhase+MOON_SPELL_BONUS);
    spawnMsg('SPELL CAPTURE! +LIFE  ☽+'+Math.round(MOON_SPELL_BONUS*100)+'%','#44ccff',true);
  }
  score+=300;
  bullets.forEach(b=>b.active=false);bullets=[];sakuyaClocks=[];sakuyaTSKnives=[];
  const next=skPhase+1;
  if(next>=6){skBossDefeated();return;}
  if(next===2&&!skSpellDlgShown){
    skSpellDlgShown=true;
    startDlg(SK_DLG.cirno.spell1,()=>{gstate='playing';skStartPhase(next);});
    return;
  }
  if(next===3&&!skEyeRedShown){
    skEyeRedShown=true;
    startDlg(SK_DLG.cirno.eyered,()=>{gstate='playing';skStartPhase(next);});
    return;
  }
  skStartPhase(next);
}

function skBossDefeated(){
  if(spellActive&&!spellHit&&!spellBombed){
    score+=5000;lives=Math.min(4,lives+1);
    moonPhase=Math.min(1,moonPhase+MOON_SPELL_BONUS);
  }
  score+=500;
  bullets.forEach(b=>b.active=false);bullets=[];sakuyaClocks=[];sakuyaTSKnives=[];
  startDlg(SK_DLG.cirno.defeat,()=>{gstate='win';stopMusic();skShowEnd('win');});
}

function skPlayerHit(){
  if(invT>0||gstate!=='playing')return;
  SFX.hit();lives--;flashT=20;invT=120;
  moonPhase=Math.max(0,moonPhase-MOON_HIT_COST);
  spawnPart(P.x,P.y,'#ffaacc',20);
  bullets.forEach(b=>b.active=false);bullets=[];
  if(spellActive)spellHit=true;
  if(lives<=0){gstate='dead';stopMusic();skShowEnd('dead');}
}

function skShowEnd(reason){
  if(score>hiScore)hiScore=score;
  const ov=document.getElementById('overlay');
  const pb=document.getElementById('pauseBtn');
  if(pb)pb.style.display='none';
  const win=reason==='win';
  const moonout=reason==='moonout';

  const title=win?'ERRAND<br>COMPLETE':moonout?'THE TEA<br>WENT COLD':'ERRAND<br>FAILED';
  const msg=win?"Lady Remilia's tea will be on time. Nothing happened.":moonout?"Sakuya arrived. The tea was cold. Lady Remilia said nothing.<br><small style='color:#888'>...That was somehow worse.</small>":"The book remains at large.";
  const DIFF_NAMES=['LEISURELY PACE','PUNCTUAL','RUNNING LATE','THE TEA IS COLD'];
  ov.innerHTML=`
    <h1 style="color:${col};text-shadow:0 0 20px ${col}66;font-size:26px;">${title}</h1>
    <div class="sub" style="color:#556677;margin-top:4px;">${msg}</div>
    <div class="score-disp" style="margin-top:8px;">${score.toString().padStart(8,'0')}</div>
    <div class="sub">GRAZE: ${graze} &nbsp;|&nbsp; HI: ${hiScore.toString().padStart(8,'0')}</div>
    <div style="display:flex;gap:6px;margin-top:6px;">
      ${[0,1,2,3].map(i=>`<button class="sakuya-diff-btn" data-sd="${i}" style="width:auto;padding:4px 8px;font-size:9px;">${DIFF_NAMES[i]}</button>`).join('')}
    </div>
    <button id="sakuyaRetryBtn" style="margin-top:8px;background:none;border:2px solid #aaccff;color:#aaccff;font-family:Cinzel,serif;font-size:14px;padding:8px 24px;cursor:pointer;letter-spacing:3px;">✦ RETRY</button>
    ${(!win&&canContinueRun())?'<button id="continueBtn" style="margin-top:4px;background:none;border:2px solid #44ccff;color:#44ccff;font-family:Cinzel,serif;font-size:12px;padding:7px 20px;cursor:pointer;letter-spacing:2px;">↻ CONTINUE (SCORE RESET)</button>':''}
    <button id="skMenuBtn" style="margin-top:4px;background:none;border:1px solid #334;color:#446;font-family:Cinzel,serif;font-size:10px;padding:4px 14px;cursor:pointer;letter-spacing:2px;">← MAIN MENU</button>
  `;
  ov.style.display='flex';
  ov.querySelectorAll('[data-sd]').forEach(b=>{

      difficulty=+b.dataset.sd;
      ov.querySelectorAll('[data-sd]').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    });
  });
  document.getElementById('sakuyaRetryBtn').onclick=()=>{
    initAudio();ov.style.display='none';
    document.getElementById('pauseBtn').style.display='block';
    sakuyaMode=true;cirnoMode=false;gstate='dialogue';resetGame();
  };
  const continueBtn=document.getElementById('continueBtn');
  if(continueBtn)continueBtn.onclick=()=>{initAudio();continueRun();};
  document.getElementById('skMenuBtn').onclick=goMainMenu;
}

// ── SAKUYA TIMESTOP ───────────────────────────────────────────────────────
const skTsEl=document.getElementById('tsOverlay');
function skTriggerTS(){
  if(sakuyaTS||sakuyaTSCool>0||gstate!=='playing')return;
  sakuyaTS=true;sakuyaTSBar=sakuyaTSMax;
  SFX.skTsOn();duckMusic(.25,.12);
  if(skTsEl)skTsEl.style.opacity=1;
}
function skReleaseTS(){
  if(!sakuyaTS)return;
  sakuyaTS=false;sakuyaTSBar=0;sakuyaTSCool=SAKUYA_TS_COOLMAX;
  SFX.skTsOff();unduckMusic();
  if(skTsEl)skTsEl.style.opacity=0;
  sakuyaTSKnives.forEach(k=>{k.frozen=false;});
}
function skFireKnives(){
  if(sakuyaTSBar<=SAKUYA_KNIFE_COST)return;
  sakuyaTSBar-=SAKUYA_KNIFE_COST;
  SFX.skKnife();
  const dx=bossX-P.x,dy=bossY-P.y;
  const baseA=Math.atan2(dy,dx);
  [-1.5,-.5,.5,1.5].forEach(o=>{
    const a=baseA+o*.05;
    const kx=P.x+Math.cos(a)*SAKUYA_KNIFE_RANGE;
    const ky=P.y+Math.sin(a)*SAKUYA_KNIFE_RANGE;
    sakuyaTSKnives.push({x:kx,y:ky,vx:Math.cos(a)*12,vy:Math.sin(a)*12,angle:a,frozen:true,active:true,life:1});
  });
  spawnPart(P.x,P.y,'#ffffff',6);
}

// ── SAKUYA BULLET PATTERNS ────────────────────────────────────────────────
function skSpawnBullet(x,y,angle,spd,col,r=4,shape='circle'){
  const b={x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,active:true,col,r,shape,grazed:false};
  bullets.push(b);
}
function skFirePattern(){
  const d=SK_DIFF[difficulty];
  const g=SK_GEOM[difficulty];
  const spd=d.bspd;
  const pat=spellActive?(SPELLS_SK_CIRNO[Math.floor(skPhase/2)]?.pat||'sk_icicle'):null;
  if(!spellActive){
    const n=3+g.aimExtra;
    for(let i=0;i<n;i++){
      const a=Math.PI/2+(i-(n-1)/2)*.38+Math.sin(phaseST*.03)*.3;
      skSpawnBullet(bossX,bossY,a,spd,'#44ccff',4);
    }
    if(phaseST%90===0){
      const rings=g.concentric?2:1;
      for(let r=0;r<rings;r++){
        const n2=Math.round(12*g.ringMult);
        for(let i=0;i<n2;i++){
          const a=i/n2*PI2+(r===1?Math.PI/n2:0)+spiralA*.1;
          skSpawnBullet(bossX,bossY,a,spd*.7,'#88ddff',3);
        }
      }
    }
    return;
  }
  if(pat==='sk_icicle'){
    if(phaseST%22===0){
      const n=6+g.arms*2;
      for(let i=0;i<n;i++){
        const x=40+((i*(W-80)/n)+Math.sin(phaseST*.05)*30+W)%W;
        skSpawnBullet(x,-10,Math.PI/2+(.15-(i%3)*.15),spd*.9,'#aaeeff',5,'diamond');
      }
      const shots=1+g.homingN;
      for(let i=0;i<shots;i++){
        const a=Math.PI/2+(i-(shots-1)/2)*.5;
        skSpawnBullet(bossX,bossY,a,spd,'#44ccff',4);
      }
    }
  } else if(pat==='sk_freeze'){
    if(phaseST%60===0){
      const n=Math.round(16*g.ringMult);
      for(let i=0;i<n;i++){
        skSpawnBullet(bossX,bossY,i/n*PI2+spiralA,spd*.5,'#ffffff',5,'diamond');
      }
      spiralA+=.4;
    }
    if(phaseST%60===30){
      bullets.forEach(b=>{if(b.active&&b.col==='#ffffff'){b.vx*=2.2;b.vy*=2.2;}});
    }
    if(phaseST%45===0){
      const shots=2+g.aimExtra;
      for(let i=0;i<shots;i++){
        skSpawnBullet(bossX,bossY,spiralA+i/shots*PI2,spd*1.1,'#44ccff',4);
      }
    }
  } else if(pat==='sk_blizzard'){
    if(phaseST%15===0){
      const arms=4+g.arms;
      for(let a=0;a<arms;a++){
        const base=spiralA+a/arms*PI2;
        skSpawnBullet(bossX,bossY,base,spd,'#cceeff',4,'diamond');
        skSpawnBullet(bossX,bossY,base+.15,spd*1.15,'#cceeff',4,'diamond');
      }
      spiralA+=.07;
    }
    if(phaseST%35===0){
      const shots=1+g.homingN;
      for(let i=0;i<shots;i++){
        const a=Math.PI/2+(i-(shots-1)/2)*.35+Math.sin(phaseST*.02)*.4;
        skSpawnBullet(bossX,bossY,a,spd*1.2,'#ffffff',5);
      }
    }
  }
}

// ── SAKUYA MODE UPDATE ────────────────────────────────────────────────────
function updateSakuyaMode(){
  frame++;phaseST++;

  // Moon passive drain
  moonPhase-=MOON_DRAIN_PER_FRAME[Math.min(difficulty,3)];
  moonWarning=moonPhase<=.15;
  if(moonPhase<=0){
    if(moonGrace===0){
      moonGrace=MOON_GRACE_DUR;
      spawnMsg('THE TEA WILL BE COLD','#ffdd88',true);
      SFX.moonWarn();
    } else {
      moonGrace--;
      if(moonGrace<=0){gstate='moonout';stopMusic();skShowEnd('moonout');return;}
    }
  }

  // TS upgrade at 10k
  if(!sakuyaTSUpgraded&&score>=10000){
    sakuyaTSUpgraded=true;sakuyaTSMax=210;
    SFX.skUpgrade();spawnMsg('TIMESTOP UPGRADED — 7 SEC','#ffd700',true);
  }

  // Timestop tick
  if(sakuyaTS){sakuyaTSBar--;if(sakuyaTSBar<=0)skReleaseTS();}
  if(sakuyaTSCool>0)sakuyaTSCool--;

  // Player movement
  const d=SK_DIFF[difficulty];
  const spd=sakuyaTS?SAKUYA_PLAYER_SPD*SAKUYA_TS_MOVE_FACTOR:SAKUYA_PLAYER_SPD;
  if(keys.KeyA)P.x=Math.max(20,P.x-spd);
  if(keys.KeyD)P.x=Math.min(W-20,P.x+spd);
  if(keys.KeyW)P.y=Math.max(20,P.y-spd);
  if(keys.KeyS)P.y=Math.min(H-30,P.y+spd);

  // Shoot
  if(keys.KeyG&&shotT<=0){
    if(sakuyaTS){
      skFireKnives();shotT=18;
    } else {
      pshots.push({x:P.x,y:P.y-5,vx:0,vy:-14,dmg:3});
      pshots.push({x:P.x-6,y:P.y,vx:-.4,vy:-13,dmg:2});
      pshots.push({x:P.x+6,y:P.y,vx:.4,vy:-13,dmg:2});
      shotT=7;if(frame%3===0)SFX.shoot();
    }
  }
  if(shotT>0)shotT--;

  // Boss movement (frozen during TS)
  if(!sakuyaTS){
    bossX+=bossDX;bossWob+=.05;
    if(bossX>W-60||bossX<60)bossDX*=-1;
    bossY=130+Math.sin(bossWob)*15;
  }

  // Fire pattern
  if(!sakuyaTS){
    const fi=Math.max(8,Math.round(22/d.density));
    if(phaseST%fi===0)skFirePattern();
  }

  // Player shots
  pshots=pshots.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>W||p.y<0||p.y>H)return false;
    const dx=p.x-bossX,dy=p.y-bossY;
    if(dx*dx+dy*dy<BOSS_HIT_R2){
      phaseHP-=p.dmg;spellHit=true;
      spawnPart(p.x,p.y,'#44ccff',3);
      if(phaseHP<=0){skPhaseDefeated();return false;}
      return false;
    }
    return true;
  });

  // Knives
  sakuyaTSKnives=sakuyaTSKnives.filter(k=>{
    if(!k.active)return false;
    if(k.frozen)return true;
    k.x+=k.vx;k.y+=k.vy;k.life-=.035;
    if(k.life<=0||k.x<0||k.x>W||k.y<0||k.y>H)return false;
    // destroy bullets → drop clocks
    for(let i=0;i<bullets.length;i++){
      const b=bullets[i];if(!b.active)continue;
      const dx=k.x-b.x,dy=k.y-b.y;
      if(dx*dx+dy*dy<(b.r+6)*(b.r+6)){
        b.active=false;
        sakuyaClocks.push({x:b.x,y:b.y,vy:.8,life:1,val:b.shape==='diamond'?300:150,spawned:false});
        spawnPart(b.x,b.y,'#aaccff',3);
      }
    }
    const dx=k.x-bossX,dy=k.y-bossY;
    if(dx*dx+dy*dy<BOSS_HIT_R2){
      phaseHP-=12;spellHit=true;
      spawnPart(k.x,k.y,'#ffffff',5);
      if(phaseHP<=0){skPhaseDefeated();}
      return false;
    }
    return true;
  });

  // Spawn independent clocks
  clockSpawnT++;
  if(clockSpawnT>=CLOCK_SPAWN_RATE){
    clockSpawnT=0;
    const cx=30+Math.random()*(W-60);
    sakuyaClocks.push({x:cx,y:-10,vy:.6+Math.random()*.4,val:50,spawned:true});
  }

  // Clock collection + drift
  sakuyaClocks=sakuyaClocks.filter(c=>{
    const frozenClock=sakuyaTS&&c.spawned;
    if(!frozenClock)c.y+=c.vy;
    if(!c.spawned)c.life-=.003;
    if(c.y>H+20)return false;
    if(!c.spawned&&c.life<=0)return false;
    const dx=c.x-P.x,dy=c.y-P.y;
    if(dx*dx+dy*dy<400){
      score+=c.val;
      moonPhase=Math.min(1,moonPhase+.005);// tiny moon restore
      spawnMsg('+'+c.val,'#ffd700',false);
      spawnPart(c.x,c.y,'#ffd700',4);
      SFX.skClock();return false;
    }
    return true;
  });

  // Bullets
  const ab=[];
  for(let i=0;i<bullets.length;i++){
    const b=bullets[i];if(!b.active)continue;
    if(sakuyaTS){ab.push(b);continue;}
    b.x+=b.vx;b.y+=b.vy;
    if(b.x<-20||b.x>W+20||b.y<-20||b.y>H+20){b.active=false;continue;}
    if(!b.grazed){
      const dx=b.x-P.x,dy=b.y-P.y,d2=dx*dx+dy*dy;
      if(d2<576&&d2>100){b.grazed=true;graze++;score+=50;SFX.graze();}
    }
    if(invT<=0){
      const dx=b.x-P.x,dy=b.y-P.y;
      if(dx*dx+dy*dy<100){skPlayerHit();b.active=false;continue;}
    }
    ab.push(b);
  }
  bullets=ab;

  particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.life-=.025;p.vx*=.96;p.vy*=.96;return p.life>0;});
  fmsgs=fmsgs.filter(m=>{m.y+=m.vy;m.life-=.018;return m.life>0;});
  if(flashT>0)flashT--;
  if(invT>0)invT--;
}

// ── SAKUYA BACKGROUND: MISTY LAKE ─────────────────────────────────────────
function drawBgMistyLake(){
  const sky=ctx.createLinearGradient(0,0,0,H*.65);
  sky.addColorStop(0,'#050d18');sky.addColorStop(.4,'#091525');
  sky.addColorStop(.7,'#0d1e30');sky.addColorStop(1,'#152436');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  // Stars
  SK_STARS.forEach((s,i)=>{
    const sy=(s.x*.3+i*22)%320;
    ctx.globalAlpha=s.br*(1-sy/280)*(Math.sin(rf*s.spd+i)*.3+.7);
    ctx.fillStyle='#aaccff';ctx.beginPath();ctx.arc(s.x,sy,1,0,PI2);ctx.fill();
  });
  ctx.globalAlpha=1;
  // Shore silhouette
  ctx.fillStyle='#060f1a';ctx.beginPath();ctx.moveTo(0,H*.52);
  for(let x=0;x<=W;x+=8){ctx.lineTo(x,H*.52+Math.sin(x*.018)*12+Math.sin(x*.041)*6);}
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
  // Water
  const water=ctx.createLinearGradient(0,H*.5,0,H);
  water.addColorStop(0,'#071626');water.addColorStop(.3,'#091c30');water.addColorStop(1,'#050e1a');
  ctx.fillStyle=water;ctx.fillRect(0,H*.5,W,H*.5);
  // Water shimmer
  for(let i=0;i<12;i++){
    const wy=H*.54+i*18+Math.sin(rf*.015+i*.4)*3;
    ctx.strokeStyle=`rgba(100,180,220,${.04+i*.008})`;ctx.lineWidth=.7;
    ctx.beginPath();ctx.moveTo(40+Math.sin(rf*.008+i*.9)*20,wy);
    ctx.lineTo(40+Math.sin(rf*.008+i*.9)*20+(50+Math.sin(rf*.01+i)*30),wy);ctx.stroke();
  }
  // Ripples
  SK_RIPPLES.forEach(r=>{
    const ph=rf*r.spd+r.phase;
    ctx.globalAlpha=.08+.04*Math.sin(ph);ctx.strokeStyle='#88ccee';ctx.lineWidth=.8;
    ctx.beginPath();ctx.ellipse(r.x+Math.sin(ph*.3)*8,r.y+Math.sin(ph*.2)*4,8+Math.sin(ph)*4,(8+Math.sin(ph)*4)*.3,0,0,PI2);ctx.stroke();
  });
  ctx.globalAlpha=1;
  // Reeds
  SK_REEDS.forEach(r=>{
    const sway=Math.sin(rf*.012+r.x*.03)*r.lean*20;
    ctx.strokeStyle='#1a2e1a';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(r.x,r.y);ctx.quadraticCurveTo(r.x+sway*.5,r.y-r.h*.5,r.x+sway,r.y-r.h);ctx.stroke();
    ctx.fillStyle='#2a3e20';ctx.beginPath();ctx.ellipse(r.x+sway,r.y-r.h,2,6,sway*.02,0,PI2);ctx.fill();
  });
  // Fog
  SK_FOG.forEach(fw=>{
    const fx=fw.x+Math.sin(rf*fw.spd+fw.phase)*15;
    const fy=fw.y+Math.sin(rf*fw.spd*.7+fw.phase+1)*8;
    const alpha=.025+.015*Math.sin(rf*fw.spd+fw.phase);
    const grad=ctx.createRadialGradient(fx,fy,0,fx,fy,fw.w);
    grad.addColorStop(0,`rgba(160,200,230,${alpha})`);grad.addColorStop(1,'rgba(160,200,230,0)');
    ctx.fillStyle=grad;ctx.beginPath();ctx.ellipse(fx,fy,fw.w,fw.w*.35,0,0,PI2);ctx.fill();
  });
  // Edge vignette fog

// ── MOON HUD ──────────────────────────────────────────────────────────────
function drawMoon(){
  const mx=W-34,my=34,mr=22;
  ctx.save();
  // Glow ring when warning
  if(moonWarning){
    const pulse=.4+.4*Math.sin(rf*.12);
    ctx.strokeStyle=`rgba(255,${moonGrace>0?100:180},0,${pulse})`;
    ctx.lineWidth=2;ctx.beginPath();ctx.arc(mx,my,mr+4,0,PI2);ctx.stroke();
  }
  // Moon circle base
  ctx.fillStyle='#0a1525';ctx.beginPath();ctx.arc(mx,my,mr,0,PI2);ctx.fill();
  // Moon lit area — clip to circle, fill arc based on phase
  ctx.save();ctx.beginPath();ctx.arc(mx,my,mr,0,PI2);ctx.clip();
  // Draw lit portion using moonPhase
  // Full(1.0) = white circle. 0.5 = half. 0.0 = black.
  // Lit side is always the right side (waning left to right)
  const lit=Math.max(0,moonPhase);
  if(lit>0){
    ctx.fillStyle=moonWarning?(moonGrace>0?`rgba(255,140,0,${.7+.2*Math.sin(rf*.1)})`:`rgba(255,80,0,${.7+.2*Math.sin(rf*.15)})`):'#e8eeff';
    // Draw the lit crescent/disc using ellipse: full circle when lit=1, sliver when lit≈0
    // Map phase 0→1 to ellipse x-radius -mr→+mr
    const termX=mr*(2*lit-1); // -mr at 0, 0 at 0.5, +mr at 1
    ctx.beginPath();
    // Lit half: right semicircle of circle
    ctx.arc(mx,my,mr,-Math.PI/2,Math.PI/2);
    // Terminator: ellipse from top to bottom at termX offset
    ctx.ellipse(mx+termX,my,Math.abs(termX)||0.1,mr,0,Math.PI/2,-Math.PI/2,lit<.5);
    ctx.closePath();ctx.fill();
  }
  ctx.restore();
  // Outer rim
  ctx.strokeStyle='#aaccff33';ctx.lineWidth=1;ctx.beginPath();ctx.arc(mx,my,mr,0,PI2);ctx.stroke();
  // Phase % text
  const pct=Math.round(moonPhase*100);
  ctx.fillStyle=moonWarning?`rgba(255,${moonGrace>0?140:80},0,1)`:'#aaccff88';
  ctx.font='bold 8px Cinzel';ctx.textAlign='center';
  ctx.fillText(pct+'%',mx,my+mr+10);
  // Grace period countdown
  if(moonGrace>0){
    ctx.fillStyle=`rgba(255,140,0,${.6+.3*Math.sin(rf*.15)})`;
    ctx.font='bold 9px Cinzel';ctx.textAlign='center';
    ctx.fillText('☕ COLD IN '+Math.ceil(moonGrace/60)+'s',W/2,18);
  }
  ctx.restore();
}

    ctx.fillStyle='#ffffff';ctx.font='bold 9px Cinzel';ctx.textAlign='left';ctx.fillText('ACTIVE',tsX+tsW+4,tsY+8);

// ── SAKUYA MODE FULL RENDER ───────────────────────────────────────────────
function renderSakuyaMode(){
  drawBgMistyLake();

      ctx.strokeStyle=b.col;ctx.lineWidth=1;ctx.fillStyle=b.col+'33';

  });

// ── MAIN LOOP ─────────────────────────────────────────────────────────────
function loop(){
  rf++;
  if(sakuyaMode){
    // ── SAKUYA MODE BRANCH ──────────────────────────────────────────────
    if(gstate==='playing')updateSakuyaMode();
    else if(gstate==='dialogue'){updateDlg();}
    ctx.clearRect(0,0,W,H);
    if(gstate==='playing'||gstate==='dialogue'||gstate==='moonout'){
      renderSakuyaMode();
    }
    requestAnimationFrame(loop);
    return;
  }
  update();
  rf++;
  if(gstate==='warning'){drawWarning();}
  else{
    drawBg();drawMasterSpark();
    particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,PI2);ctx.fill();});ctx.globalAlpha=1;
    if(bossType==='patchouli')drawBooks();
    drawBoss();drawFlanClonesAndLasers();drawBullets();drawPshots();
    if(bossSpecialBeam){
      const bx2=bossSpecialBeam.x,bw2=bossSpecialBeam.w,life=bossSpecialBeam.life,maxL=bossSpecialBeam.max;
      ctx.save();
      const g2=ctx.createLinearGradient(bx2-bw2,0,bx2+bw2,0);
      g2.addColorStop(0,'rgba(255,220,0,0)');g2.addColorStop(.5,`rgba(255,255,150,${.6*life/maxL})`);g2.addColorStop(1,'rgba(255,220,0,0)');
      ctx.fillStyle=g2;ctx.fillRect(bx2-bw2,bossY,bw2*2,H-bossY);
      const cg2=ctx.createLinearGradient(bx2-bw2*.3,0,bx2+bw2*.3,0);
      cg2.addColorStop(0,'rgba(255,255,200,0)');cg2.addColorStop(.5,`rgba(255,255,255,${.85*life/maxL})`);cg2.addColorStop(1,'rgba(255,255,200,0)');
      ctx.fillStyle=cg2;ctx.fillRect(bx2-bw2*.3,bossY,bw2*.6,H-bossY);
      ctx.restore();
    }
    if(bossSpecialState==='telegraph'&&dualActive){
      const sp2=DUAL_SPELLS[dualSpellIdx%DUAL_SPELLS.length];
      ctx.save();ctx.globalAlpha=.25*(1-bossSpecialTelegraph/40);
      ctx.fillStyle=sp2.col;ctx.fillRect(0,0,W,H);ctx.restore();
      ctx.save();ctx.strokeStyle=sp2.col;ctx.lineWidth=2;ctx.globalAlpha=.6;
      ctx.setLineDash([8,8]);
      if(sp2.who==='reimu'){
        for(let i=0;i<6;i++){const a=Math.PI/2-Math.PI*.275+i/5*Math.PI*.55;ctx.beginPath();ctx.moveTo(bossX,bossY);ctx.lineTo(bossX+Math.cos(a)*120,bossY+Math.sin(a)*120);ctx.stroke();}
      } else {
        ctx.beginPath();ctx.moveTo(bossX,bossY);ctx.lineTo(bossX,H);ctx.stroke();
      }
      ctx.setLineDash([]);ctx.restore();
      ctx.save();ctx.fillStyle=sp2.col;ctx.font='bold 11px Cinzel';ctx.textAlign='center';ctx.globalAlpha=rf%20<10?1:.4;
      ctx.fillText(sp2.who==='reimu'?'FANTASY TOSS!':'REAL SPARK!',W/2,bossY+30);ctx.restore();
    }
    bombOrbs=bombOrbs.filter(orb=>{
      const dx=bossX-orb.x,dy=bossY-orb.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      orb.vx=orb.vx*.9+dx/d*3*.1;orb.vy=orb.vy*.9+dy/d*3*.1;
      orb.x+=orb.vx;orb.y+=orb.vy;orb.pulse+=.12;
      orb.trail.push({x:orb.x,y:orb.y});
      if(orb.trail.length>12)orb.trail.shift();
      if(d<22){spawnPart(orb.x,orb.y,orb.col,8);return false;}
      orb.trail.forEach((t,i)=>{ctx.globalAlpha=(i/orb.trail.length)*.35;ctx.strokeStyle=orb.col;ctx.lineWidth=1;ctx.beginPath();ctx.arc(t.x,t.y,3,0,PI2);ctx.stroke();});
      ctx.globalAlpha=orb.life;ctx.strokeStyle=orb.col;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(orb.x,orb.y,8+Math.sin(orb.pulse)*2,0,PI2);ctx.stroke();
      ctx.globalAlpha=orb.life*.5;ctx.strokeStyle=orb.col+'88';ctx.lineWidth=4;
      ctx.beginPath();ctx.arc(orb.x,orb.y,12+Math.sin(orb.pulse)*3,0,PI2);ctx.stroke();
      ctx.strokeStyle='#ffffff';ctx.lineWidth=1;ctx.globalAlpha=orb.life;
      ctx.beginPath();ctx.arc(orb.x,orb.y,5,0,PI2);ctx.stroke();
      ctx.globalAlpha=1;
      return true;
    });
    sballs.forEach(sb=>{
      const g=.6+.4*Math.sin(sb.pulse);
      ctx.save();ctx.globalAlpha=g;ctx.translate(sb.x,sb.y);ctx.rotate(Math.sin(sb.pulse)*.15);
      ctx.strokeStyle='#ff4466';ctx.lineWidth=1.5;ctx.fillStyle='#ffffff22';
      ctx.fillRect(-5,-8,10,16);ctx.strokeRect(-5,-8,10,16);
      ctx.strokeStyle='#ff4466';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-5,0);ctx.lineTo(5,0);ctx.stroke();
      ctx.strokeStyle='#ffaacc';ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(-3,-5);ctx.lineTo(3,-5);ctx.moveTo(-3,4);ctx.lineTo(3,4);ctx.stroke();
      ctx.restore();
    });
    drawPlayer();
    fmsgs.forEach(m=>{ctx.globalAlpha=Math.min(1,m.life*2);ctx.font=(m.big?'bold 18px':'12px')+' Cinzel';ctx.textAlign='center';ctx.strokeStyle='#000';ctx.lineWidth=3;ctx.strokeText(m.text,m.x,m.y);ctx.fillStyle=m.col;ctx.fillText(m.text,m.x,m.y);});
    ctx.globalAlpha=1;ctx.textAlign='left';
    drawHUD();drawDlg();drawScreenCrack();
  }
  requestAnimationFrame(loop);
}

// ── INPUT & SETUP ─────────────────────────────────────────────────────────
let prevGstate='playing';

function openPause(){
  if(gstate==='menu'||gstate==='dead'||gstate==='win'||gstate==='truewin')return;
  prevGstate=gstate;
  gstate='paused';
  stopMusic();
  const po=document.getElementById('pauseOverlay');
  const pb=document.getElementById('pauseBtn');
  document.getElementById('pauseSub').textContent=
    (cirnoMode?'⑨ CIRNO MODE  ':'')+'SCORE: '+score.toString().padStart(8,'0')+'  |  HI: '+hiScore.toString().padStart(8,'0');
  po.style.display='flex';
  if(pb)pb.textContent='▶ PLAY';
}

function closePause(){
  const po=document.getElementById('pauseOverlay');
  const pb=document.getElementById('pauseBtn');
  po.style.display='none';
  if(pb)pb.textContent='II PAUSE';
  gstate=prevGstate;
  const musicKey=cirnoMode?'cirno':(bossType==='flandre'?'flandre':bossType);
  startMusic(musicKey);
}

function goMainMenu(){
  const po=document.getElementById('pauseOverlay');
  po.style.display='none';
  document.getElementById('pauseBtn').textContent='II PAUSE';
  document.getElementById('pauseBtn').style.display='none';
  stopMusic();
  if(tsActive)releaseTS();
  if(freezeActive)releaseFreeze();
  if(sakuyaTS)skReleaseTS();
  sakuyaMode=false;
  bullets.forEach(b=>b.active=false);bullets=[];
  pshots=[];particles=[];sballs=[];fmsgs=[];bombOrbs=[];
  sparkBeam=null;bombActive=false;
  gstate='menu';
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1 id="titleH1" style="color:#cc0033;text-shadow:0 0 20px #cc003388;">SCARLET<br>MANSION</h1>
    <div class="sub">SELECT YOUR OPPONENT</div>
    <div class="boss-select">
      <button class="boss-btn remilia${bossType==='remilia'?' active':''}" data-boss="remilia">REMILIA<br><span style="font-size:10px;opacity:.6">SCARLET DEVIL</span></button>
      <button class="boss-btn sakuya${bossType==='sakuya'?' active':''}" data-boss="sakuya">SAKUYA<br><span style="font-size:10px;opacity:.6">PERFECT MAID</span></button>
      <button class="boss-btn patchouli${bossType==='patchouli'?' active':''}" data-boss="patchouli">PATCHOULI<br><span style="font-size:10px;opacity:.6">GREAT LIBRARY</span></button>
      <button class="boss-btn meiling${bossType==='meiling'?' active':''}" data-boss="meiling">MEILING<br><span style="font-size:10px;opacity:.6">GATE GUARD</span></button>
    </div>
    <div class="sub" style="color:#555;font-size:10px;margin-top:2px">SHIFT=MARISA &bull; DEFEAT ANY BOSS TO UNLOCK ★</div>
    <div id="diffSelect">${DIFF.map((d,i)=>`<button class="diff-btn${i===difficulty?' active':''}" data-d="${i}">${d.name}</button>`).join('')}</div>
    <div class="sub" style="color:#444;margin-top:2px">WASD MOVE &nbsp;G SHOOT &nbsp;F FREEZE/BOMB &nbsp;SHIFT=SHIELD(CIRNO)/MARISA</div>
    <div class="score-disp" id="hiScoreDisp">HI: ${hiScore.toString().padStart(8,'0')}</div>
    <button id="startBtn">BEGIN</button>
    <button id="cirnoBtn">⑨ CIRNO MODE</button>`;
  ov.style.display='flex';
  setupUI();
}

window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.key))e.preventDefault();
  if(e.code==='Escape'){
    if(gstate==='paused')closePause();
    else openPause();
  }
  // Sakuya mode timestop — press once to activate, press again to release
  if(sakuyaMode&&e.code==='KeyF'&&!sakuyaTSKeyHeld){
    sakuyaTSKeyHeld=true;
    if(!sakuyaTS&&sakuyaTSCool===0&&gstate==='playing')skTriggerTS();
    else if(sakuyaTS)skReleaseTS();
  }
});
window.addEventListener('keyup',e=>{
  keys[e.code]=false;
  if(sakuyaMode&&e.code==='KeyF')sakuyaTSKeyHeld=false;
});
let tx=0,ty=0;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const dx=e.touches[0].clientX-tx,dy=e.touches[0].clientY-ty;P.x=Math.max(20,Math.min(W-20,P.x+dx*.5));P.y=Math.max(20,Math.min(H-30,P.y+dy*.5));tx=e.touches[0].clientX;ty=e.touches[0].clientY;keys.KeyG=true;},{passive:false});
canvas.addEventListener('touchend',()=>{keys.KeyG=false;});

function setupUI(){
  const resumeBtn=document.getElementById('resumeBtn');
  const mainMenuBtn=document.getElementById('mainMenuBtn');
  const pauseBtnEl=document.getElementById('pauseBtn');
  if(resumeBtn)resumeBtn.onclick=closePause;
  if(mainMenuBtn)mainMenuBtn.onclick=goMainMenu;
  if(pauseBtnEl)pauseBtnEl.onclick=()=>{if(gstate==='paused')closePause();else openPause();};

  document.querySelectorAll('.boss-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      bossType=btn.dataset.boss;
      document.querySelectorAll('.boss-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const h1=document.getElementById('titleH1');
      if(h1){h1.style.color=BOSS_TITLE_COL[bossType]||'#cc0033';h1.style.textShadow='0 0 20px '+(BOSS_TITLE_COL[bossType]||'#cc0033')+'88';}
    });
  });
  document.querySelectorAll('.diff-btn').forEach(btn=>{btn.addEventListener('click',()=>{difficulty=+btn.dataset.d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');});});
  const sb=document.getElementById('startBtn');
  if(sb)sb.addEventListener('click',()=>{
    initAudio();document.getElementById('overlay').style.display='none';
    document.getElementById('pauseBtn').style.display='block';
    cirnoMode=false;gstate='playing';resetGame();startMusic(bossType);
  });
  const cb=document.getElementById('cirnoBtn');
  if(cb)cb.addEventListener('click',()=>{
    document.getElementById('overlay').style.display='none';
    document.getElementById('overlay2').style.display='flex';
  });

  let cirnoDiff=0;
  const cirnoDiffBtns=document.querySelectorAll('.cirno-diff-btn');
  cirnoDiffBtns.forEach(b=>{
    b.addEventListener('click',()=>{
      cirnoDiff=parseInt(b.dataset.cd);
      cirnoDiffBtns.forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    });
  });

  const csb=document.getElementById('cirnoStartBtn');
  if(csb)csb.addEventListener('click',()=>{
    initAudio();
    difficulty=cirnoDiff;
    document.getElementById('overlay2').style.display='none';
    document.getElementById('pauseBtn').style.display='block';
    cirnoMode=true;gstate='dialogue';resetGame();
  });

  const backBtn=document.getElementById('cirnoBackBtn');
  if(backBtn)backBtn.addEventListener('click',()=>{
    document.getElementById('overlay2').style.display='none';
    document.getElementById('overlay').style.display='flex';
  });
  const hi=document.getElementById('hiScoreDisp');if(hi)hi.textContent='HI: '+hiScore.toString().padStart(8,'0');

  // ── SAKUYA MODE UI ──────────────────────────────────────────────────────
  const skBtn=document.getElementById('sakuyaBtn');
  if(skBtn)skBtn.addEventListener('click',()=>{
    document.getElementById('overlay').style.display='none';
    document.getElementById('overlay3').style.display='flex';
  });

  let sakuyaDiff=0;
  document.querySelectorAll('.sakuya-diff-btn[data-sd]').forEach(b=>{
    b.addEventListener('click',()=>{
      sakuyaDiff=parseInt(b.dataset.sd);
      document.querySelectorAll('.sakuya-diff-btn[data-sd]').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
    });
  });

  const ssb=document.getElementById('sakuyaStartBtn');
  if(ssb)ssb.addEventListener('click',()=>{
    initAudio();
    difficulty=sakuyaDiff;
    document.getElementById('overlay3').style.display='none';
    document.getElementById('pauseBtn').style.display='block';
    sakuyaMode=true;cirnoMode=false;
    resetGame();
  });

  const sbk=document.getElementById('sakuyaBackBtn');
  if(sbk)sbk.addEventListener('click',()=>{
    document.getElementById('overlay3').style.display='none';
    document.getElementById('overlay').style.display='flex';
  });
}

setupUI();loop();
</script>
